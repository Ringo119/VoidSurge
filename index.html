<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VOIDSURGE">
<meta name="theme-color" content="#04040a">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<title>VOIDSURGE</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --sat: env(safe-area-inset-top, 0px);
    --sar: env(safe-area-inset-right, 0px);
    --sab: env(safe-area-inset-bottom, 0px);
    --sal: env(safe-area-inset-left, 0px);
  }
  html, body { width:100%; height:100%; overflow:hidden; background:#04040a; }
  body {
    display:flex; align-items:center; justify-content:center;
    position:fixed; inset:0;
    touch-action:none; overscroll-behavior:none;
    -webkit-user-select:none; user-select:none;
    -webkit-touch-callout:none; -webkit-tap-highlight-color:transparent;
  }
  canvas { display:block; cursor:crosshair; touch-action:none; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
"use strict";
/* ============================================================
   VOIDSURGE — a neon wave-survival twin-stick shooter
   Everything procedural: art, sound, music. No assets.
   ============================================================ */

// ---------- Canvas & sizing ----------
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
let W = 0, H = 0, DPR = 1;
// iOS ignores the manifest "orientation" field — PWAs can't lock to landscape.
// When the viewport is portrait we render the whole game rotated 90° instead
// (ROT = true): logical W/H swap, the base canvas transform turns the scene,
// and eventXY() maps client coords back into game space.
let ROT = false;
// notch / home-indicator insets (iPhone), read from the CSS env() vars
const SAFE = { t: 0, r: 0, b: 0, l: 0 };
function readSafeArea() {
  try {
    if (typeof getComputedStyle !== "function" || !document.documentElement) return;
    const cs = getComputedStyle(document.documentElement);
    const t = parseFloat(cs.getPropertyValue("--sat")) || 0;
    const r = parseFloat(cs.getPropertyValue("--sar")) || 0;
    const b = parseFloat(cs.getPropertyValue("--sab")) || 0;
    const l = parseFloat(cs.getPropertyValue("--sal")) || 0;
    if (ROT) { SAFE.t = r; SAFE.r = b; SAFE.b = l; SAFE.l = t; }
    else { SAFE.t = t; SAFE.r = r; SAFE.b = b; SAFE.l = l; }
  } catch (e) {}
}
function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  const vw = window.innerWidth, vh = window.innerHeight;
  ROT = vh > vw;
  W = ROT ? vh : vw; H = ROT ? vw : vh;
  canvas.width = vw * DPR; canvas.height = vh * DPR;
  canvas.style.width = vw + "px"; canvas.style.height = vh + "px";
  // rotated: game point (x, y) lands at screen (vw - y, x) — hold the phone notch-left
  if (ROT) ctx.setTransform(0, DPR, -DPR, 0, vw * DPR, 0);
  else ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  readSafeArea();
}
// map a pointer/touch event's client coords into game space
function eventXY(t) {
  return ROT ? { x: t.clientY, y: window.innerWidth - t.clientX } : { x: t.clientX, y: t.clientY };
}
window.addEventListener("resize", resize);
// iOS standalone PWAs fire these late (or with stale sizes) on rotation — retry
window.addEventListener("orientationchange", () => { setTimeout(resize, 50); setTimeout(resize, 400); });
if (typeof window.visualViewport !== "undefined" && window.visualViewport) {
  window.visualViewport.addEventListener("resize", resize);
}
resize();

// ---------- Utils ----------
const TAU = Math.PI * 2;
const rand = (a, b) => a + Math.random() * (b - a);
const randInt = (a, b) => Math.floor(rand(a, b + 1));
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
const lerp = (a, b, t) => a + (b - a) * t;
const dist2 = (ax, ay, bx, by) => { const dx = bx - ax, dy = by - ay; return dx * dx + dy * dy; };
const angleTo = (ax, ay, bx, by) => Math.atan2(by - ay, bx - ax);
const pick = arr => arr[Math.floor(Math.random() * arr.length)];
const inRect = (x, y, r) => x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h;

// ---------- Audio (all synthesized) ----------
const Sound = {
  ctx: null, master: null, muted: false,
  init() {
    if (this.ctx) return;
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      this.master = this.ctx.createGain();
      this.master.gain.value = 0.32;
      this.master.connect(this.ctx.destination);
    } catch (e) { this.ctx = null; }
  },
  resume() { if (this.ctx && this.ctx.state === "suspended") this.ctx.resume(); },
  tone(freq, dur, type = "square", vol = 0.2, slideTo = null, when = 0) {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime + when;
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, t);
    if (slideTo !== null) o.frequency.exponentialRampToValueAtTime(Math.max(slideTo, 1), t + dur);
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g); g.connect(this.master);
    o.start(t); o.stop(t + dur + 0.02);
  },
  noise(dur, vol = 0.2, filterFreq = 2000, when = 0) {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime + when;
    const len = Math.max(1, Math.floor(this.ctx.sampleRate * dur));
    const buf = this.ctx.createBuffer(1, len, this.ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
    const src = this.ctx.createBufferSource();
    src.buffer = buf;
    const f = this.ctx.createBiquadFilter();
    f.type = "lowpass"; f.frequency.value = filterFreq;
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    src.connect(f); f.connect(g); g.connect(this.master);
    src.start(t);
  },
  shoot()   { this.tone(rand(820, 900), 0.08, "square", 0.10, 220); },
  enemyShoot() { this.tone(rand(300, 340), 0.12, "sawtooth", 0.07, 120); },
  hit()     { this.noise(0.05, 0.12, 3000); },
  boom(big = false) {
    this.noise(big ? 0.5 : 0.25, big ? 0.35 : 0.2, big ? 900 : 1400);
    this.tone(big ? 90 : 140, big ? 0.45 : 0.2, "sine", big ? 0.3 : 0.18, 40);
  },
  pickup()  { this.tone(660, 0.07, "sine", 0.12, 990); this.tone(990, 0.1, "sine", 0.1, 1320, 0.06); },
  heal()    { this.tone(440, 0.12, "sine", 0.14, 880); this.tone(660, 0.18, "sine", 0.12, 1100, 0.1); },
  dash()    { this.noise(0.18, 0.14, 5000); this.tone(300, 0.15, "sine", 0.08, 600); },
  hurt()    { this.noise(0.2, 0.25, 1000); this.tone(160, 0.25, "sawtooth", 0.18, 60); },
  upgrade() { [523, 659, 784, 1047].forEach((f, i) => this.tone(f, 0.25, "triangle", 0.13, null, i * 0.07)); },
  bossWarn(){ [0, 0.3, 0.6].forEach(w => this.tone(110, 0.25, "sawtooth", 0.2, 220, w)); },
  gameOver(){ [392, 311, 233, 155].forEach((f, i) => this.tone(f, 0.4, "triangle", 0.15, null, i * 0.22)); },
  wave()    { this.tone(523, 0.15, "triangle", 0.12, null, 0); this.tone(784, 0.2, "triangle", 0.12, null, 0.1); },
};

// ---------- Music (step sequencer, minor-key arpeggio) ----------
const Music = {
  step: 0, nextTime: 0, bpm: 116,
  // A minor pentatonic-ish patterns
  bass:  [110, 0, 110, 0, 131, 0, 110, 0, 98, 0, 98, 0, 147, 0, 131, 0],
  arp:   [440, 523, 659, 523, 440, 587, 523, 440, 392, 440, 523, 440, 392, 349, 392, 440],
  update() {
    if (!Sound.ctx || Sound.muted) return;
    const ct = Sound.ctx.currentTime;
    if (this.nextTime < ct - 0.5) this.nextTime = ct; // resync after pause
    const stepDur = 60 / this.bpm / 4;
    while (this.nextTime < ct + 0.15) {
      const s = this.step;
      const intensity = state === "play" ? 1 : 0.5;
      const b = this.bass[s % 16];
      if (b) Sound.tone(b, stepDur * 2.2, "triangle", 0.10 * intensity, null, this.nextTime - ct);
      if (s % 2 === 0 && state === "play") {
        Sound.tone(this.arp[(s >> 1) % 16] * (wave >= 10 ? 2 : 1), stepDur * 1.2, "square", 0.028 * intensity, null, this.nextTime - ct);
      }
      if (s % 4 === 2) Sound.noise(0.03, 0.045 * intensity, 7000, this.nextTime - ct); // hat
      if (s % 8 === 0) Sound.tone(70, 0.1, "sine", 0.16 * intensity, 45, this.nextTime - ct); // kick
      this.step = (this.step + 1) % 32;
      this.nextTime += stepDur;
    }
  }
};

// ---------- Input ----------
const keys = {};
const mouse = { x: 0, y: 0, down: false };
window.addEventListener("keydown", e => {
  keys[e.code] = true;
  if (["Space", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.code)) e.preventDefault();
  handleKeyPress(e.code);
});
window.addEventListener("keyup", e => keys[e.code] = false);
canvas.addEventListener("mousemove", e => { const p = eventXY(e); mouse.x = p.x; mouse.y = p.y; TOUCH.active = false; });
canvas.addEventListener("mousedown", e => { mouse.down = true; TOUCH.active = false; handleClick(); });
canvas.addEventListener("mouseup", () => mouse.down = false);
window.addEventListener("blur", () => { for (const k in keys) keys[k] = false; mouse.down = false; releaseAllTouches(); });

// ---------- Touch controls (mobile / iOS) ----------
// Left half of the screen = drag-anywhere move stick, right half = aim stick
// (firing while held past the deadzone), plus on-screen dash/pause/mute buttons.
const TOUCH = {
  active: false,            // virtual controls in use (last input was touch)
  move: { id: null, ox: 0, oy: 0, dx: 0, dy: 0, mag: 0 },
  aim:  { id: null, ox: 0, oy: 0, dx: 0, dy: 0, mag: 0 },
  stickR: 58,
  dead: 0.25,
};
try {
  if (typeof matchMedia === "function" && matchMedia("(pointer: coarse)").matches) TOUCH.active = true;
} catch (e) {}

function dashBtn()  { return { x: W - 72 - SAFE.r, y: H - 72 - SAFE.b, r: 42 }; }
function pauseBtn() { return { x: W - 92 - SAFE.r, y: 96 + SAFE.t, r: 22 }; }
function muteBtn()  { return { x: W - 40 - SAFE.r, y: 96 + SAFE.t, r: 22 }; }
function inCircle(x, y, c, pad = 8) { return dist2(x, y, c.x, c.y) < (c.r + pad) * (c.r + pad); }

function releaseAllTouches() {
  for (const s of [TOUCH.move, TOUCH.aim]) { s.id = null; s.dx = 0; s.dy = 0; s.mag = 0; }
}

function grabStick(s, t) {
  const p = eventXY(t);
  s.id = t.identifier; s.ox = p.x; s.oy = p.y; s.dx = 0; s.dy = 0; s.mag = 0;
}

function onTouchStart(e) {
  e.preventDefault();
  TOUCH.active = true;
  Sound.init(); Sound.resume();
  for (const t of e.changedTouches) {
    const p = eventXY(t), x = p.x, y = p.y;
    if (state === "title") {
      const b = titleButtonAt(x, y);
      if (b) state = b; else startGame();
      return;
    }
    if (state === "scores" || state === "stats") { state = "title"; return; }
    if (state === "ships") { if (!shipCardAction(x, y)) state = "title"; return; }
    if (state === "settings") { if (!settingAction(x, y)) state = "title"; return; }
    if (state === "over") {
      if (gameOverT > 0.4 && inRect(x, y, overMenuRect())) state = "title";
      else if (gameOverT > 0.8) startGame();
      return;
    }
    if (state === "upgrade") {
      const rects = upgradeCardRects();
      for (let i = 0; i < rects.length; i++) {
        const r = rects[i];
        if (x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h) { chooseUpgrade(i); break; }
      }
      continue;
    }
    // state === "play"
    if (introPopup) { if (introPopup.t > 0.35) introPopup = null; continue; }
    if (paused) { paused = false; continue; }
    if (inCircle(x, y, pauseBtn())) { paused = true; releaseAllTouches(); continue; }
    if (inCircle(x, y, muteBtn())) { Sound.muted = !Sound.muted; continue; }
    if (inCircle(x, y, dashBtn(), 16)) { tryDash(); continue; }
    if (x < W * 0.45) {
      if (TOUCH.move.id === null) grabStick(TOUCH.move, t);
    } else if (TOUCH.aim.id === null) {
      grabStick(TOUCH.aim, t);
    }
  }
}

function onTouchMove(e) {
  e.preventDefault();
  for (const t of e.changedTouches) {
    for (const s of [TOUCH.move, TOUCH.aim]) {
      if (s.id !== t.identifier) continue;
      const p = eventXY(t);
      let dx = p.x - s.ox, dy = p.y - s.oy;
      const len = Math.hypot(dx, dy);
      const m = Math.min(len / TOUCH.stickR, 1);
      if (len > 0) { dx /= len; dy /= len; }
      s.dx = dx * m; s.dy = dy * m; s.mag = m;
    }
  }
}

function onTouchEnd(e) {
  e.preventDefault();
  for (const t of e.changedTouches) {
    for (const s of [TOUCH.move, TOUCH.aim]) {
      if (s.id === t.identifier) { s.id = null; s.dx = 0; s.dy = 0; s.mag = 0; }
    }
  }
}

canvas.addEventListener("touchstart", onTouchStart, { passive: false });
canvas.addEventListener("touchmove", onTouchMove, { passive: false });
canvas.addEventListener("touchend", onTouchEnd, { passive: false });
canvas.addEventListener("touchcancel", onTouchEnd, { passive: false });
if (typeof document.addEventListener === "function") {
  document.addEventListener("gesturestart", e => e.preventDefault()); // block iOS pinch zoom
}

// ---------- Game state ----------
const VERSION = "1.5.0"; // bump alongside the sw.js cache when shipping

// The arena is a fixed-size world, independent of screen size; a camera
// follows the player and clamps at the world border. Screens larger than
// the world per axis just center it.
const WORLD = { w: 1600, h: 900 };
const cam = { x: 0, y: 0 };
function updateCamera(dt) {
  const tx = W >= WORLD.w ? (WORLD.w - W) / 2 : clamp(player.x - W / 2, 0, WORLD.w - W);
  const ty = H >= WORLD.h ? (WORLD.h - H) / 2 : clamp(player.y - H / 2, 0, WORLD.h - H);
  if (dt === null) { cam.x = tx; cam.y = ty; return; } // snap (run start)
  const k = 1 - Math.pow(0.002, dt);
  cam.x += (tx - cam.x) * k;
  cam.y += (ty - cam.y) * k;
}

let state = "title";          // title | play | upgrade | over
let paused = false;
let wave = 0;
let score = 0;
let combo = 1, comboTimer = 0;
let highScore = +(localStorage.getItem("voidsurge_hi") || 0);
let shake = 0;
let flashAlpha = 0;           // red damage flash
let waveBannerT = 0;
let bossWarnT = 0;
let time = 0;
let gameOverT = 0;

// Entity arrays
let bullets = [], enemyBullets = [], enemies = [], particles = [], pickups = [], texts = [], drones = [];
let boss = null;

// ---------- Meta progression (persistent) ----------
function loadJSON(key, fb) {
  try { const v = JSON.parse(localStorage.getItem(key)); return v === null ? fb : v; }
  catch (e) { return fb; }
}
function saveJSON(key, v) { try { localStorage.setItem(key, JSON.stringify(v)); } catch (e) {} }
function bump(obj, key) { obj[key] = (obj[key] || 0) + 1; }

let scores = loadJSON("voidsurge_scores", []); // top 10 runs: { s: score, w: wave, d: "YYYY-MM-DD" }
const stats = Object.assign({
  runs: 0, kills: 0, wavesCleared: 0, bosses: 0, bestWave: 0, bestCombo: 0,
  dashes: 0, pickups: 0, playTime: 0, killsBy: {}, deathsBy: {}, augments: {},
}, loadJSON("voidsurge_stats", {}));
function saveStats() { saveJSON("voidsurge_stats", stats); }

// Ship skins, each unlocked by an achievement
const SKINS = [
  { id: "vanguard", name: "VANGUARD", hull: "#7df9ff", fill: "#0c2233", trail: "#3fa9ff", bullet: "#7df9ff", unlock: "always yours" },
  { id: "crimson",  name: "CRIMSON",  hull: "#ff3d6e", fill: "#330a14", trail: "#ff5e3a", bullet: "#ff7a9c", unlock: "destroy a Void Harbinger" },
  { id: "volt",     name: "VOLT",     hull: "#ffe066", fill: "#332a08", trail: "#ffaa00", bullet: "#ffe066", unlock: "reach combo x9" },
  { id: "ember",    name: "EMBER",    hull: "#ff5e3a", fill: "#33100a", trail: "#ffaa00", bullet: "#ffc09a", unlock: "reach wave 10" },
  { id: "spectre",  name: "SPECTRE",  hull: "#b14dff", fill: "#1d0a33", trail: "#b14dff", bullet: "#d9a8ff", unlock: "reach wave 20" },
  { id: "aurora",   name: "AURORA",   hull: "#27e8a7", fill: "#06281c", trail: "#27e8a7", bullet: "#9dffd9", unlock: "dash 100 times (lifetime)" },
  { id: "midas",    name: "MIDAS",    hull: "#ffd700", fill: "#33260a", trail: "#ffe066", bullet: "#fff3b0", unlock: "grab 250 pickups (lifetime)" },
  { id: "ghost",    name: "GHOST",    hull: "#e8f4ff", fill: "#1a2230", trail: "#8aa8c8", bullet: "#ffffff", unlock: "clear wave 5+ untouched" },
];
const unlocked = Object.assign({ vanguard: true }, loadJSON("voidsurge_ach", {}));
let skinId = "vanguard";
try { const sv = localStorage.getItem("voidsurge_skin"); if (sv && unlocked[sv]) skinId = sv; } catch (e) {}
let SKIN = SKINS.find(s => s.id === skinId) || SKINS[0];

function selectSkin(id) {
  if (!unlocked[id]) return;
  skinId = id;
  SKIN = SKINS.find(s => s.id === id) || SKINS[0];
  try { localStorage.setItem("voidsurge_skin", id); } catch (e) {}
  Sound.pickup();
}

const toasts = [];
function toast(str) {
  toasts.push({ str, life: 4 });
  if (toasts.length > 3) toasts.shift();
}

function unlock(id) {
  if (unlocked[id]) return;
  unlocked[id] = true;
  saveJSON("voidsurge_ach", unlocked);
  const sk = SKINS.find(s => s.id === id);
  if (sk) toast("UNLOCKED: " + sk.name + " SHIP");
  Sound.upgrade();
}

// ---------- Settings (persistent) ----------
const settings = Object.assign({ enemyIntros: true }, loadJSON("voidsurge_settings", {}));
const SETTING_DEFS = [
  { id: "enemyIntros", name: "ENEMY INTEL POPUPS",
    desc: "pause and brief you on each new enemy type the first time it appears in a run" },
];
function toggleSetting(id) {
  settings[id] = !settings[id];
  saveJSON("voidsurge_settings", settings);
  Sound.pickup();
}

// run-scoped meta state
let lastRunRank = -1;     // where the run that just ended landed on the board
let ghostWave = 0;        // wave where your best run died
let ghostNoteT = 0;
let recordBroken = false;
let damagedThisWave = false;
let introPopup = null;    // { type, t } — freezes play while a new hostile is briefed
let seenThisRun = {};     // enemy/boss types already introduced this run
let bossEncounters = {};  // per-run fight counts; repeat encounters gain modifiers

// ---------- Stars (parallax background) ----------
const stars = [];
function initStars() {
  stars.length = 0;
  for (let i = 0; i < 140; i++) {
    stars.push({ x: Math.random(), y: Math.random(), z: rand(0.2, 1), tw: rand(0, TAU) });
  }
}
initStars();

// ---------- Player ----------
const player = {
  x: 0, y: 0, vx: 0, vy: 0, angle: 0, r: 13,
  hp: 100, maxHp: 100,
  speed: 270,
  fireDelay: 0.22, fireT: 0,
  bulletDmg: 10, bulletSpeed: 620, bulletCount: 1, spread: 0.09,
  pierce: 0, critChance: 0.05, lifesteal: 0,
  dashCd: 1.6, dashT: 0, dashing: 0, invuln: 0,
  shield: 0, maxShield: 0,
  magnet: 110,
  trailT: 0,
};

function resetPlayer() {
  Object.assign(player, {
    x: WORLD.w / 2, y: WORLD.h / 2, vx: 0, vy: 0, angle: 0,
    hp: 100, maxHp: 100, speed: 270,
    fireDelay: 0.22, fireT: 0,
    bulletDmg: 10, bulletSpeed: 620, bulletCount: 1, spread: 0.09,
    pierce: 0, critChance: 0.05, lifesteal: 0,
    dashCd: 1.6, dashT: 0, dashing: 0, invuln: 0,
    shield: 0, maxShield: 0, magnet: 110, trailT: 0,
  });
  drones = [];
  updateCamera(null);
}

// ---------- Upgrades ----------
const UPGRADES = [
  { id: "dmg",     name: "OVERCHARGE",     desc: "+35% bullet damage",            icon: "⚡", apply: () => player.bulletDmg *= 1.35 },
  { id: "rate",    name: "RAPID CYCLER",   desc: "+25% fire rate",                icon: "»",  apply: () => player.fireDelay *= 0.78 },
  { id: "multi",   name: "SPLIT CANNON",   desc: "+1 projectile per shot",        icon: "Ψ",  apply: () => { player.bulletCount++; player.spread += 0.05; } },
  { id: "pierce",  name: "LANCE ROUNDS",   desc: "Bullets pierce +1 enemy",       icon: "→",  apply: () => player.pierce++ },
  { id: "speed",   name: "ION THRUSTERS",  desc: "+18% movement speed",           icon: "↟",  apply: () => player.speed *= 1.18 },
  { id: "hp",      name: "HULL PLATING",   desc: "+30 max HP and full heal",      icon: "✚",  apply: () => { player.maxHp += 30; player.hp = player.maxHp; } },
  { id: "dash",    name: "PHASE DRIVE",    desc: "-30% dash cooldown",            icon: "↯",  apply: () => player.dashCd *= 0.7 },
  { id: "crit",    name: "TARGET MATRIX",  desc: "+12% crit chance (3x dmg)",     icon: "◎",  apply: () => player.critChance += 0.12 },
  { id: "drone",   name: "SENTRY DRONE",   desc: "Orbiting drone that auto-fires", icon: "✦", apply: () => drones.push({ a: rand(0, TAU), fireT: 0 }) },
  { id: "magnet",  name: "TRACTOR FIELD",  desc: "+70% pickup attraction range",  icon: "◉",  apply: () => player.magnet *= 1.7 },
  { id: "shield",  name: "AEGIS BARRIER",  desc: "Shield blocks 1 hit per wave",  icon: "⬡",  apply: () => { player.maxShield++; player.shield = player.maxShield; } },
  { id: "vamp",    name: "VOID SIPHON",    desc: "Heal 1 HP per kill",            icon: "♥",  apply: () => player.lifesteal += 1 },
  { id: "bspeed",  name: "RAILGUN COILS",  desc: "+30% bullet velocity",          icon: "≫",  apply: () => player.bulletSpeed *= 1.3 },
];
let upgradeChoices = [];
let hoveredCard = -1;
const taken = {}; // count per id

function rollUpgrades() {
  const pool = UPGRADES.filter(u => {
    const n = taken[u.id] || 0;
    if (u.id === "drone" && n >= 3) return false;
    if (u.id === "shield" && n >= 2) return false;
    if (u.id === "vamp" && n >= 3) return false;
    return true;
  });
  upgradeChoices = [];
  const copy = pool.slice();
  for (let i = 0; i < 3 && copy.length; i++) {
    const idx = Math.floor(Math.random() * copy.length);
    upgradeChoices.push(copy.splice(idx, 1)[0]);
  }
}

function chooseUpgrade(i) {
  const u = upgradeChoices[i];
  if (!u) return;
  u.apply();
  taken[u.id] = (taken[u.id] || 0) + 1;
  bump(stats.augments, u.id);
  Sound.upgrade();
  spawnText(player.x, player.y - 40, u.name, "#7df9ff", 18);
  startWave(wave + 1);
}

// ---------- Enemies ----------
// intro = first wave the type can spawn on; cost/weight feed the wave budget roll
const ENEMY_TYPES = {
  drifter: { r: 15, hp: 20, speed: 70,  dmg: 12, score: 10, color: "#ff3d6e", intro: 1, cost: 1,   weight: 1,
             name: "DRIFTER", desc: "homes in on your ship. slow, fragile, and never alone." },
  darter:  { r: 10, hp: 10, speed: 150, dmg: 8,  score: 15, color: "#ffaa00", intro: 2, cost: 1.2, weight: 1,
             name: "DARTER", desc: "winds up, then lunges in a blistering straight dash. step aside and punish it." },
  sentry:  { r: 14, hp: 28, speed: 55,  dmg: 10, score: 25, color: "#b14dff", intro: 3, cost: 2,   weight: 0.8,
             name: "SENTRY", desc: "holds its range and fires aimed plasma bolts. close the gap or strafe the shots." },
  titan:   { r: 28, hp: 90, speed: 38,  dmg: 20, score: 50, color: "#ff5e3a", intro: 6, cost: 4,   weight: 0.5,
             name: "TITAN", desc: "heavily armored bruiser. splits into three drifters when destroyed." },
  orbiter: { r: 11, hp: 18, speed: 120, dmg: 9,  score: 20, color: "#27e8a7", intro: 4, cost: 1.8, weight: 0.8,

  // late-game hunters: high cost keeps them rare, high stats keep them scary
  shielder: { r: 16, hp: 45,  speed: 60,  dmg: 14, score: 40, color: "#4da6ff", intro: 7,  cost: 3,   weight: 0.7,

  minelayer:{ r: 15, hp: 38,  speed: 85,  dmg: 18, score: 45, color: "#ffd24d", intro: 11, cost: 3.5, weight: 0.5,
             name: "MINELAYER", desc: "keeps its distance and seeds the arena with proximity mines. mind your footing." },
  reaver:   { r: 22, hp: 130, speed: 90,  dmg: 22, score: 70, color: "#ff2e2e", intro: 13, cost: 5,   weight: 0.4,
             name: "REAVER", desc: "void-forged hunter-killer. runs you down — and detonates into a bullet nova when destroyed." },
};

// Guarantee: at most one new enemy type debuts per wave, and never on a boss
// wave (where the budget roll doesn't run). Later declarations get bumped to
// the next free wave, so newly added types can't pile onto an existing intro.
(function spaceOutIntros() {
  const used = {};
  for (const k in ENEMY_TYPES) {
    const t = ENEMY_TYPES[k];
    while (used[t.intro] || t.intro % 5 === 0) t.intro++;
    used[t.intro] = true;
  }
})();

// First sighting of a type this run pops the intel briefing (if enabled)
function maybeBrief(type) {
  if (seenThisRun[type]) return;
  seenThisRun[type] = true;
  if (settings.enemyIntros && state === "play") {
    introPopup = { type, t: 0 };
    releaseAllTouches();
    Sound.tone(180, 0.3, "sawtooth", 0.12, 90);
  }
}

function spawnEnemy(type, x, y, scale = 1) {
  const t = ENEMY_TYPES[type];
  maybeBrief(type);
  enemies.push({
    type, x, y, r: t.r,
    hp: t.hp * scale, maxHp: t.hp * scale,
    speed: t.speed * (1 + (scale - 1) * 0.25),
    dmg: t.dmg, score: Math.round(t.score * scale),
    color: t.color,
    angle: rand(0, TAU), fireT: rand(1, 2.5), lungeT: rand(0.5, 2), lunging: 0,
    orbitDir: Math.random() < 0.5 ? 1 : -1, orbitDist: rand(140, 220),
    spawnT: 0.6, hitFlash: 0, wobble: rand(0, TAU),
    cloaked: 0, visT: rand(1.8, 2.8), baseA: null,
  });
}

function edgeSpawnPos() {
  // just outside the camera's view so spawns stay near the action,
  // clamped into the world when the view butts against the border
  const m = 40;
  const side = randInt(0, 3);
  let x, y;
  if (side === 0)      { x = rand(cam.x - m, cam.x + W + m); y = cam.y - m; }
  else if (side === 1) { x = rand(cam.x - m, cam.x + W + m); y = cam.y + H + m; }
  else if (side === 2) { x = cam.x - m; y = rand(cam.y - m, cam.y + H + m); }
  else                 { x = cam.x + W + m; y = rand(cam.y - m, cam.y + H + m); }
  return [clamp(x, 20, WORLD.w - 20), clamp(y, 20, WORLD.h - 20)];
}

// ---------- Waves ----------
let spawnQueue = [];
let spawnTimer = 0;
let waveActive = false;

function startWave(n) {
  wave = n;
  state = "play";
  waveActive = true;
  waveBannerT = 2.2;
  damagedThisWave = false;
  ghostNoteT = (n > 1 && n === ghostWave) ? 3.2 : 0; // score ghost: best run died here
  if (n > stats.bestWave) stats.bestWave = n;
  if (n >= 10) unlock("ember");
  if (n >= 20) unlock("spectre");
  player.shield = player.maxShield;
  bullets = []; enemyBullets = [];
  spawnQueue = [];
  boss = null;

  if (n % 5 === 0) {
    // Boss wave
    bossWarnT = 2.0;
    Sound.bossWarn();
    const scale = 1 + (n / 5 - 1) * 0.55;
    setTimeout(() => {}, 0);
    spawnQueue.push({ boss: true, scale, delay: 2.0 });
    // a few escorts
    const escorts = Math.min(3 + Math.floor(n / 5), 8);
    for (let i = 0; i < escorts; i++) spawnQueue.push({ type: pick(["drifter", "darter"]), scale: 1 + n * 0.04, delay: 3 + i * 1.2 });
  } else {
    Sound.wave();
    const budget = 5 + n * 2.4;
    const scale = 1 + n * 0.055;
    let b = budget, d = 0.4;
    const weights = Object.keys(ENEMY_TYPES).map(k => {
      const t = ENEMY_TYPES[k];
      return [k, t.cost, n >= t.intro ? t.weight : 0];
    });
    const totalW = weights.reduce((s, w) => s + w[2], 0);
    while (b > 0) {
      let r = Math.random() * totalW, chosen = weights[0];
      for (const w of weights) { r -= w[2]; if (r <= 0) { chosen = w; break; } }
      spawnQueue.push({ type: chosen[0], scale, delay: d });
      b -= chosen[1];
      d += rand(0.25, 0.8) * Math.max(0.4, 1 - n * 0.04);
    }
  }
  spawnTimer = 0;
}

// ---------- Bosses ----------
// Two bosses alternate: Harbinger on wave 5, Mother on 10, Harbinger on 15...
// The first fight against each boss in a run is plain; repeat encounters get
// a random modifier from that boss's set of 5.
const BOSSES = {
  harbinger: {
    name: "VOID HARBINGER", color: "#ff2255", r: 52, hp: 600, speed: 60, dmg: 25, score: 400,
    desc: "cycles radial bursts, aimed volleys, and a telegraphed charge. calls reinforcements when wounded.",
    mods: [
      { id: "berserk", name: "BERSERKER",   desc: "faster — and charges twice" },
      { id: "storm",   name: "BULLETSTORM", desc: "denser, faster volleys" },
      { id: "warp",    name: "WARPSHIFT",   desc: "teleports beside you to charge" },
      { id: "aegis",   name: "PHASE AEGIS", desc: "periodically immune to damage" },
      { id: "leech",   name: "VOID LEECH",  desc: "heals whenever it hurts you" },
    ],
  },
