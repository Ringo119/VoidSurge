function bossIdForWave(n) {
  return Math.floor(n / 5) % 2 === 1 ? "harbinger" : "mother";
}

function spawnBoss(scale) {
  const id = bossIdForWave(wave);
  const def = BOSSES[id];
  bossEncounters[id] = (bossEncounters[id] || 0) + 1;
  const mod = bossEncounters[id] > 1 ? pick(def.mods) : null;
  const [x, y] = edgeSpawnPos();
  boss = {
    id, x, y, r: def.r,
    hp: def.hp * scale, maxHp: def.hp * scale,
    speed: def.speed, dmg: def.dmg, score: Math.round(def.score * scale * (mod ? 1.3 : 1)),
    color: def.color,
    phase: 0, phaseT: 3, fireT: 1.5, angle: 0,
    charging: 0, chargeAngle: 0, hitFlash: 0, spawnT: 1, minionT: 8,
    chargesLeft: 0, shieldT: 8, shielded: 0,                        // harbinger
    coreT: 4, coreOpen: 0, broodT: 3,                               // mother
    edgeA: Math.atan2(y - WORLD.h / 2, x - WORLD.w / 2), edgeDir: Math.random() < 0.5 ? 1 : -1, edgeT: rand(4, 8),
    scale, mod: mod ? mod.id : null, modName: mod ? mod.name : null,
  };
  if (mod) {
    spawnText(cam.x + W / 2, cam.y + H * 0.42, mod.name + " — " + mod.desc, def.color, 18);
    toast(def.name + " MODIFIER: " + mod.name);
  }
  maybeBrief(id);
}

// ---------- Spawn helpers ----------
function spawnParticles(x, y, color, count, speed = 160, life = 0.6, size = 3) {
  for (let i = 0; i < count; i++) {
    const a = rand(0, TAU), s = rand(speed * 0.3, speed);
    particles.push({
      x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s,
      life: rand(life * 0.5, life), maxLife: life,
      color, size: rand(size * 0.5, size * 1.4),
    });
  }
}

function spawnText(x, y, str, color = "#fff", size = 14) {
  texts.push({ x, y, str, color, size, life: 1.1, vy: -40 });
}

function spawnPickup(x, y, kind) {
  pickups.push({ x, y, kind, vx: rand(-40, 40), vy: rand(-40, 40), life: 10, bob: rand(0, TAU) });
}

function killEnemy(e) {
  Sound.boom(e.type === "titan");
  spawnParticles(e.x, e.y, e.color, e.type === "titan" ? 34 : 16, e.type === "titan" ? 260 : 180, 0.7, e.type === "titan" ? 5 : 3.5);
  shake = Math.min(shake + (e.type === "titan" ? 9 : 4), 18);
  const pts = e.score * combo;
  score += pts;
  combo = Math.min(combo + 1, 9);
  comboTimer = 3.5;
  stats.kills++; bump(stats.killsBy, e.type);
  if (combo > stats.bestCombo) stats.bestCombo = combo;
  if (combo >= 9) unlock("volt");
  spawnText(e.x, e.y, "+" + pts, "#ffe066", 13);
  if (player.lifesteal > 0) player.hp = Math.min(player.hp + player.lifesteal, player.maxHp);
  if (e.type === "titan") {
    for (let i = 0; i < 3; i++) {
      spawnEnemy("drifter", e.x + rand(-25, 25), e.y + rand(-25, 25), 0.7 + wave * 0.03);
    }
  }
  if (e.type === "reaver") {
    // death nova: radial bullet burst — back off before the kill shot
    const off = rand(0, TAU);
    for (let i = 0; i < 8; i++) enemyShoot(e.x, e.y, off + TAU * i / 8, 190, 12, "reaver");
  }
  if (Math.random() < 0.07) spawnPickup(e.x, e.y, "heal");
  else if (Math.random() < 0.18) spawnPickup(e.x, e.y, "gem");
}

function damagePlayer(dmg, src = "the void") {
  if (player.invuln > 0 || player.dashing > 0) return;
  damagedThisWave = true;
  if (player.shield > 0) {
    player.shield--;
    Sound.hit();
    spawnParticles(player.x, player.y, "#7df9ff", 18, 220, 0.5);
    spawnText(player.x, player.y - 30, "SHIELD!", "#7df9ff", 15);
    player.invuln = 0.8;
    shake = Math.min(shake + 6, 18);
    return;
  }
  player.hp -= dmg;
  player.invuln = 1.0;
  combo = 1; comboTimer = 0;
  flashAlpha = 0.45;
  shake = Math.min(shake + 10, 20);
  Sound.hurt();
  if (src === "boss" && boss && boss.mod === "leech" && boss.spawnT <= 0) {
    boss.hp = Math.min(boss.maxHp, boss.hp + boss.maxHp * 0.05);
    spawnText(boss.x, boss.y - boss.r - 16, "SIPHON", "#ff7a9c", 14);
  }
  spawnParticles(player.x, player.y, "#ff3d6e", 14, 200, 0.5);
  if (player.hp <= 0) {
    player.hp = 0;
    bump(stats.deathsBy, src);
    gameOver();
  }
}

function gameOver() {
  state = "over";
  gameOverT = 0;
  Sound.gameOver();
  spawnParticles(player.x, player.y, SKIN.hull, 60, 320, 1.2, 5);
  shake = 22;
  if (score > highScore) {
    highScore = score;
    try { localStorage.setItem("voidsurge_hi", highScore); } catch (e) {} // Safari private mode throws
  }
  // top-10 board
  const entry = { s: score, w: wave, d: new Date().toISOString().slice(0, 10) };
  scores.push(entry);
  scores.sort((a, b) => b.s - a.s);
  scores = scores.slice(0, 10);
  lastRunRank = scores.indexOf(entry);
  saveJSON("voidsurge_scores", scores);
  saveStats();
}

function startGame() {
  resetPlayer();
  for (const k in taken) delete taken[k];
  stats.runs++;
  ghostWave = scores.length ? scores[0].w : 0;
  recordBroken = false;
  lastRunRank = -1;
  introPopup = null;
  seenThisRun = {};
  bossEncounters = {};
  score = 0; combo = 1; comboTimer = 0;
  bullets = []; enemyBullets = []; enemies = []; particles = []; pickups = []; texts = []; drones = [];
  boss = null;
  startWave(1);
}

// ---------- Input handlers ----------
function handleKeyPress(code) {
  Sound.init(); Sound.resume();
  if (code === "KeyM") { Sound.muted = !Sound.muted; return; }
  if (state === "title") {
    if (code === "Enter" || code === "Space") { startGame(); return; }
    if (code === "KeyH") { state = "scores"; return; }
    if (code === "KeyS") { state = "stats"; return; }
    if (code === "KeyC") { state = "ships"; return; }
    if (code === "KeyO") { state = "settings"; return; }
  }
  if (state === "scores" || state === "stats" || state === "ships" || state === "settings") {
    if (code === "Escape" || code === "KeyB") { state = "title"; return; }
    if (state === "ships") {
      const m = /^Digit([1-8])$/.exec(code);
      if (m && SKINS[+m[1] - 1]) selectSkin(SKINS[+m[1] - 1].id);
    }
    if (state === "settings") {
      const m = /^Digit([1-9])$/.exec(code);
      if (m && SETTING_DEFS[+m[1] - 1]) toggleSetting(SETTING_DEFS[+m[1] - 1].id);
    }
    return;
  }
  if (state === "over") {
    if (code === "KeyT") { state = "title"; return; }
    if ((code === "Enter" || code === "KeyR") && gameOverT > 0.8) { startGame(); return; }
  }
  if (state === "upgrade") {
    if (code === "Digit1") chooseUpgrade(0);
    if (code === "Digit2") chooseUpgrade(1);
    if (code === "Digit3") chooseUpgrade(2);
    return;
  }
  if (state === "play") {
    if (introPopup) {
      // any non-movement key dismisses the briefing (held move keys repeat keydown)
      if (introPopup.t > 0.35 && !/^(Key[WASD]|Arrow)/.test(code)) introPopup = null;
      return;
    }
    if (code === "KeyP" || code === "Escape") paused = !paused;
    if (code === "Space" && !paused) tryDash();
  }
}

function handleClick() {
  Sound.init(); Sound.resume();
  if (state === "title") {
    const b = titleButtonAt(mouse.x, mouse.y);
    if (b) { state = b; return; }
    startGame(); return;
  }
  if (state === "scores" || state === "stats") { state = "title"; return; }
  if (state === "ships") {
    if (!shipCardAction(mouse.x, mouse.y)) state = "title";
    return;
  }
  if (state === "settings") {
    if (!settingAction(mouse.x, mouse.y)) state = "title";
    return;
  }
  if (state === "over") {
    if (gameOverT > 0.4 && inRect(mouse.x, mouse.y, overMenuRect())) { state = "title"; return; }
    if (gameOverT > 0.8) startGame();
    return;
  }
  if (state === "upgrade" && hoveredCard >= 0) chooseUpgrade(hoveredCard);
  if (state === "play" && introPopup && introPopup.t > 0.35) introPopup = null;
}

function tryDash() {
  if (player.dashT > 0) return;
  let dx = 0, dy = 0;
  if (TOUCH.move.id !== null && TOUCH.move.mag > 0.15) {
    dx = TOUCH.move.dx; dy = TOUCH.move.dy;
  } else {
    if (keys["KeyW"] || keys["ArrowUp"]) dy -= 1;
    if (keys["KeyS"] || keys["ArrowDown"]) dy += 1;
    if (keys["KeyA"] || keys["ArrowLeft"]) dx -= 1;
    if (keys["KeyD"] || keys["ArrowRight"]) dx += 1;
  }
  if (dx === 0 && dy === 0) { dx = Math.cos(player.angle); dy = Math.sin(player.angle); }
  const len = Math.hypot(dx, dy);
  player.vx = dx / len * 780;
  player.vy = dy / len * 780;
  player.dashing = 0.18;
  player.dashT = player.dashCd;
  stats.dashes++;
  if (stats.dashes >= 100) unlock("aurora");
  Sound.dash();
  spawnParticles(player.x, player.y, SKIN.hull, 12, 150, 0.4);
}

// ---------- Update ----------
function update(dt) {
  time += dt;
  Music.update();
  if (shake > 0) shake = Math.max(0, shake - dt * 30);
  if (flashAlpha > 0) flashAlpha = Math.max(0, flashAlpha - dt * 1.2);
  if (waveBannerT > 0) waveBannerT -= dt;
  if (bossWarnT > 0) bossWarnT -= dt;
  if (ghostNoteT > 0) ghostNoteT -= dt;
  for (let i = toasts.length - 1; i >= 0; i--) {
    toasts[i].life -= dt;
    if (toasts[i].life <= 0) toasts.splice(i, 1);
  }

  // particles & texts always animate
  updateParticles(dt);
  updateTexts(dt);

  if (state === "over") { gameOverT += dt; return; }
  if (state !== "play" || paused) return;
  if (introPopup) { introPopup.t += dt; return; } // new-hostile briefing freezes play

  updatePlayer(dt);
  updateCamera(dt);
  updateDrones(dt);
  updateSpawns(dt);
  updateEnemies(dt);
  updateBoss(dt);
  updateBullets(dt);
  updateEnemyBullets(dt);
  updatePickups(dt);

  // combo decay
  if (comboTimer > 0) { comboTimer -= dt; if (comboTimer <= 0) combo = 1; }

  // lifetime stats + record pace ghost
  stats.playTime += dt;
  if (!recordBroken && highScore > 0 && score > highScore) {
    recordBroken = true;
    toast("RECORD PACE — old best " + highScore.toLocaleString());
  }

  // wave complete?
  if (waveActive && spawnQueue.length === 0 && enemies.length === 0 && !boss) {
    waveActive = false;
    stats.wavesCleared++;
    if (!damagedThisWave && wave >= 5) unlock("ghost");
    saveStats();
    score += wave * 25;
    spawnText(cam.x + W / 2, cam.y + H / 2 - 60, "WAVE CLEAR  +" + (wave * 25), "#7df9ff", 22);
    setTimeout(() => {}, 0);
    rollUpgrades();
    state = "upgrade";
    hoveredCard = -1;
  }
}

function updatePlayer(dt) {
  let dx = 0, dy = 0;
  if (TOUCH.move.id !== null && TOUCH.move.mag > 0.15) {
    dx = TOUCH.move.dx; dy = TOUCH.move.dy; // analog magnitude, already <= 1
  } else {
    if (keys["KeyW"] || keys["ArrowUp"]) dy -= 1;
    if (keys["KeyS"] || keys["ArrowDown"]) dy += 1;
    if (keys["KeyA"] || keys["ArrowLeft"]) dx -= 1;
    if (keys["KeyD"] || keys["ArrowRight"]) dx += 1;
    const kl = Math.hypot(dx, dy);
    if (kl > 0) { dx /= kl; dy /= kl; }
  }
  const len = Math.hypot(dx, dy);

  if (player.dashing > 0) {
    player.dashing -= dt;
    // velocity already set; decay slightly
    player.vx *= Math.pow(0.4, dt);
    player.vy *= Math.pow(0.4, dt);
    // dash trail
    spawnParticles(player.x, player.y, SKIN.hull, 2, 30, 0.35, 4);
  } else {
    const accel = 2400;
    player.vx = approach(player.vx, dx * player.speed, accel * dt);
    player.vy = approach(player.vy, dy * player.speed, accel * dt);
  }
  player.x = clamp(player.x + player.vx * dt, player.r, WORLD.w - player.r);
  player.y = clamp(player.y + player.vy * dt, player.r, WORLD.h - player.r);
  const aimActive = TOUCH.aim.id !== null && TOUCH.aim.mag > TOUCH.dead;
  if (aimActive) player.angle = Math.atan2(TOUCH.aim.dy, TOUCH.aim.dx);
  else if (!TOUCH.active) player.angle = angleTo(player.x, player.y, mouse.x + cam.x, mouse.y + cam.y);
  // on touch with the aim stick released, keep the last facing

  if (player.dashT > 0) player.dashT -= dt;
  if (player.invuln > 0) player.invuln -= dt;

  // engine trail
  player.trailT -= dt;
  if (player.trailT <= 0 && (len > 0 || player.dashing > 0)) {
    player.trailT = 0.03;
    const ba = player.angle + Math.PI;
    particles.push({
      x: player.x + Math.cos(ba) * 12, y: player.y + Math.sin(ba) * 12,
      vx: Math.cos(ba) * 80 + rand(-20, 20), vy: Math.sin(ba) * 80 + rand(-20, 20),
      life: 0.3, maxLife: 0.3, color: SKIN.trail, size: rand(2, 4),
    });
  }

  // shooting
  player.fireT -= dt;
  if ((mouse.down || aimActive) && player.fireT <= 0) {
    player.fireT = player.fireDelay;
    fireBullets();
  }
}

function approach(cur, target, amt) {
  if (cur < target) return Math.min(cur + amt, target);
  return Math.max(cur - amt, target);
}

function fireBullets() {
  Sound.shoot();
  const n = player.bulletCount;
  const totalSpread = player.spread * (n - 1);
  for (let i = 0; i < n; i++) {
    const a = player.angle + (n > 1 ? -totalSpread / 2 + totalSpread * (i / (n - 1)) : 0) + rand(-0.015, 0.015);
    const crit = Math.random() < player.critChance;
    bullets.push({
      x: player.x + Math.cos(player.angle) * 16,
      y: player.y + Math.sin(player.angle) * 16,
      vx: Math.cos(a) * player.bulletSpeed,
      vy: Math.sin(a) * player.bulletSpeed,
      dmg: crit ? player.bulletDmg * 3 : player.bulletDmg,
      crit, pierce: player.pierce, life: 1.4, hit: new Set(),
    });
  }
  // muzzle flash + tiny recoil
  player.vx -= Math.cos(player.angle) * 18;
  player.vy -= Math.sin(player.angle) * 18;
}

function updateDrones(dt) {
  for (const d of drones) {
    d.a += dt * 2.2;
    d.x = player.x + Math.cos(d.a) * 42;
    d.y = player.y + Math.sin(d.a) * 42;
    d.fireT -= dt;
    if (d.fireT <= 0) {
      // find nearest enemy
      let best = null, bd = 460 * 460;
      for (const e of enemies) {
        if (e.spawnT > 0 || e.cloaked > 0) continue;
        const dd = dist2(d.x, d.y, e.x, e.y);
        if (dd < bd) { bd = dd; best = e; }
      }
      if (!best && boss && boss.spawnT <= 0) best = boss;
      if (best) {
        d.fireT = 0.55;
        const a = angleTo(d.x, d.y, best.x, best.y);
        bullets.push({
          x: d.x, y: d.y,
          vx: Math.cos(a) * 520, vy: Math.sin(a) * 520,
          dmg: player.bulletDmg * 0.5, crit: false, pierce: 0, life: 1.2, hit: new Set(), drone: true,
        });
        Sound.tone(700, 0.05, "sine", 0.05, 350);
      }
    }
  }
}

function updateSpawns(dt) {
  spawnTimer += dt;
  while (spawnQueue.length && spawnQueue[0].delay <= spawnTimer) {
    const s = spawnQueue.shift();
    if (s.boss) {
      spawnBoss(s.scale);
    } else {
      const [x, y] = edgeSpawnPos();
      spawnEnemy(s.type, x, y, s.scale);
    }
  }
}

function updateEnemies(dt) {
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    if (e.hitFlash > 0) e.hitFlash -= dt;
    if (e.spawnT > 0) { e.spawnT -= dt; continue; }
    e.wobble += dt * 3;
    const aToP = angleTo(e.x, e.y, player.x, player.y);

    switch (e.type) {
      case "drifter": {
        e.x += Math.cos(aToP) * e.speed * dt;
        e.y += Math.sin(aToP) * e.speed * dt;
        e.angle = aToP;
        break;
      }
      case "darter": {
        e.lungeT -= dt;
        if (e.lunging > 0) {
          e.lunging -= dt;
          e.x += Math.cos(e.angle) * e.speed * 3.2 * dt;
          e.y += Math.sin(e.angle) * e.speed * 3.2 * dt;
        } else {
          e.angle = aToP;
          e.x += Math.cos(aToP) * e.speed * 0.5 * dt;
          e.y += Math.sin(aToP) * e.speed * 0.5 * dt;
          if (e.lungeT <= 0) { e.lunging = 0.45; e.lungeT = rand(1.4, 2.4); }
        }
        break;
      }
      case "sentry": {
        const d = Math.sqrt(dist2(e.x, e.y, player.x, player.y));
        const want = 280;
        const dir = d > want + 30 ? 1 : d < want - 30 ? -1 : 0;
        e.x += Math.cos(aToP) * e.speed * dir * dt;
        e.y += Math.sin(aToP) * e.speed * dir * dt;
        e.angle = aToP;
        e.fireT -= dt;
        if (e.fireT <= 0 && d < 560) {
          e.fireT = rand(1.6, 2.4);
          enemyShoot(e.x, e.y, aToP, 240, e.dmg, e.type);
        }
        break;
      }
      case "orbiter": {
        const d = Math.sqrt(dist2(e.x, e.y, player.x, player.y));
        const tangent = aToP + Math.PI / 2 * e.orbitDir;
        const inward = d > e.orbitDist ? 0.8 : -0.6;
        e.x += (Math.cos(tangent) + Math.cos(aToP) * inward) * e.speed * dt;
        e.y += (Math.sin(tangent) + Math.sin(aToP) * inward) * e.speed * dt;
        e.angle = aToP;
        e.fireT -= dt;
        if (e.fireT <= 0) {
          e.fireT = rand(2.0, 3.0);
          enemyShoot(e.x, e.y, aToP, 220, e.dmg, e.type);
        }
        break;
      }
      case "titan": {
        e.x += Math.cos(aToP) * e.speed * dt;
        e.y += Math.sin(aToP) * e.speed * dt;
        e.angle = aToP;
        break;
      }
      case "shielder": { // walks where it faces; limited turn rate lets you flank
        const diff = ((aToP - e.angle + Math.PI * 3) % TAU) - Math.PI;
        e.angle += clamp(diff, -1.1 * dt, 1.1 * dt);
        e.x += Math.cos(e.angle) * e.speed * dt;
        e.y += Math.sin(e.angle) * e.speed * dt;
        break;
      }
      case "weaver": { // sine-slaloms across the arena, dropping a burning wake
        if (e.baseA === null) e.baseA = aToP;
        e.lungeT -= dt;
        if (e.lungeT <= 0) { e.lungeT = rand(2.5, 4); e.baseA = aToP + rand(-0.6, 0.6); }
        const a = e.baseA + Math.sin(e.wobble * 2.4) * 1.1;
        e.x += Math.cos(a) * e.speed * dt;
        e.y += Math.sin(a) * e.speed * dt;
        e.angle = a;
        if (e.x < 16 || e.x > WORLD.w - 16) { e.baseA = Math.PI - e.baseA; e.x = clamp(e.x, 16, WORLD.w - 16); }
        if (e.y < 16 || e.y > WORLD.h - 16) { e.baseA = -e.baseA; e.y = clamp(e.y, 16, WORLD.h - 16); }
        e.fireT -= dt;
        if (e.fireT <= 0) {
          e.fireT = 0.07;
          enemyBullets.push({ x: e.x - Math.cos(a) * e.r, y: e.y - Math.sin(a) * e.r, vx: 0, vy: 0, dmg: 8, life: 2.0, r: 6, src: "weaver", trail: true });
        }
        break;
      }
      case "phantom": { // cloaks, re-materializes beside you, strikes
        if (e.cloaked > 0) {
          e.cloaked -= dt;
          if (e.cloaked <= 0) {
            const a = rand(0, TAU);
            e.x = clamp(player.x + Math.cos(a) * 170, 30, WORLD.w - 30);
            e.y = clamp(player.y + Math.sin(a) * 170, 30, WORLD.h - 30);
            e.spawnT = 0.4; // re-entry telegraph
            e.visT = rand(2.2, 3.2);
            e.lungeT = 0.55; e.lunging = 0;
            spawnParticles(e.x, e.y, e.color, 12, 140, 0.4);
            Sound.tone(620, 0.1, "sine", 0.06, 310);
          }
          break;
        }
        e.visT -= dt;
        if (e.visT <= 0) {
          e.cloaked = rand(1.0, 1.6);
          spawnParticles(e.x, e.y, e.color, 12, 100, 0.4);
          break;
        }
        e.lungeT -= dt;
        if (e.lunging > 0) {
          e.lunging -= dt;
          e.x += Math.cos(e.angle) * e.speed * 2.6 * dt;
          e.y += Math.sin(e.angle) * e.speed * 2.6 * dt;
        } else {
          e.angle = aToP;
          e.x += Math.cos(aToP) * e.speed * 0.5 * dt;
          e.y += Math.sin(aToP) * e.speed * 0.5 * dt;
          if (e.lungeT <= 0) { e.lunging = 0.4; e.lungeT = rand(1.3, 2.1); }
        }
        break;
      }
      case "minelayer": { // keeps range and seeds proximity mines
        const d = Math.sqrt(dist2(e.x, e.y, player.x, player.y));
        const dir = d < 340 ? -1 : d > 460 ? 1 : 0;
        e.x = clamp(e.x + Math.cos(aToP) * e.speed * dir * dt, 20, WORLD.w - 20);
        e.y = clamp(e.y + Math.sin(aToP) * e.speed * dir * dt, 20, WORLD.h - 20);
        e.angle = aToP;
        e.fireT -= dt;
        if (e.fireT <= 0) {
          e.fireT = rand(2.4, 3.4);
          enemyBullets.push({ x: e.x, y: e.y, vx: rand(-25, 25), vy: rand(-25, 25), dmg: e.dmg, life: 9, r: 7, src: "minelayer", mine: true, armT: 0.8 });
          spawnText(e.x, e.y - e.r - 12, "MINE", e.color, 11);
          Sound.tone(330, 0.1, "square", 0.06, 200);
        }
        break;
      }
      case "reaver": { // chases hard, fires fans, charges in close
        const d = Math.sqrt(dist2(e.x, e.y, player.x, player.y));
        e.lungeT -= dt;
        if (e.lunging > 0) {
          e.lunging -= dt;
          e.x += Math.cos(e.angle) * e.speed * 3.0 * dt;
          e.y += Math.sin(e.angle) * e.speed * 3.0 * dt;
          spawnParticles(e.x, e.y, e.color, 1, 50, 0.25, 3);
        } else {
          const diff = ((aToP - e.angle + Math.PI * 3) % TAU) - Math.PI;
          e.angle += clamp(diff, -2.4 * dt, 2.4 * dt);
          e.x += Math.cos(e.angle) * e.speed * dt;
          e.y += Math.sin(e.angle) * e.speed * dt;
          e.fireT -= dt;
          if (e.fireT <= 0 && d < 620) {
            e.fireT = rand(1.5, 2.2);
            for (let k = -1; k <= 1; k++) enemyShoot(e.x, e.y, aToP + k * 0.18, 300, e.dmg * 0.5, e.type);
          }
          if (e.lungeT <= 0 && d < 440) { e.lunging = 0.55; e.lungeT = rand(2.6, 4); e.angle = aToP; }
        }
        break;
      }
    }

    // touch damage (cloaked phantoms are intangible)
    if (e.cloaked <= 0 && dist2(e.x, e.y, player.x, player.y) < (e.r + player.r) * (e.r + player.r)) {
      damagePlayer(e.dmg, e.type);
      // knock enemy back a bit
      e.x -= Math.cos(aToP) * 20;
      e.y -= Math.sin(aToP) * 20;
    }
  }
}

function enemyShoot(x, y, angle, speed, dmg, src, home = 0) {
  Sound.enemyShoot();
  enemyBullets.push({ x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, dmg, life: 4, r: 5, src, home });
}

function updateBoss(dt) {
  if (!boss) return;
  const b = boss;
  if (b.hitFlash > 0) b.hitFlash -= dt;
  if (b.spawnT > 0) { b.spawnT -= dt; return; }
  if (b.id === "mother") updateMother(b, dt);
  else updateHarbinger(b, dt);
  // touch damage
  if (dist2(b.x, b.y, player.x, player.y) < (b.r + player.r) * (b.r + player.r)) {
    damagePlayer(b.dmg, "boss");
  }
}

function harbingerCharge(b) {
  if (b.mod === "warp") {
    // blink to the player's flank before winding up
    spawnParticles(b.x, b.y, b.color, 30, 280, 0.6, 4);
    const a = rand(0, TAU);
    b.x = clamp(player.x + Math.cos(a) * 300, 70, WORLD.w - 70);
    b.y = clamp(player.y + Math.sin(a) * 300, 70, WORLD.h - 70);
    spawnParticles(b.x, b.y, b.color, 30, 280, 0.6, 4);
    Sound.dash();
  }
  b.charging = 1.0;
  b.chargeAngle = angleTo(b.x, b.y, player.x, player.y);
}

function updateHarbinger(b, dt) {
  const aToP = angleTo(b.x, b.y, player.x, player.y);
  b.angle = lerp(b.angle, aToP, 1 - Math.pow(0.05, dt));
  const spd = b.mod === "berserk" ? 1.35 : 1;

  b.phaseT -= dt;
  if (b.phaseT <= 0) {
    b.phase = (b.phase + 1) % 3;
    b.phaseT = b.phase === 2 ? 2.2 : rand(3.5, 5);
    if (b.phase === 2) {
      b.chargesLeft = b.mod === "berserk" ? 2 : 1;
      harbingerCharge(b);
    }
  }

  if (b.phase === 2 && b.charging > 0) {
    // telegraphed charge: brief windup then dash at player
    b.charging -= dt;
    if (b.charging > 0.6) {
      // windup, shake in place
      b.x += rand(-2, 2); b.y += rand(-2, 2);
    } else {
      b.x += Math.cos(b.chargeAngle) * 480 * spd * dt;
      b.y += Math.sin(b.chargeAngle) * 480 * spd * dt;
      spawnParticles(b.x, b.y, b.color, 2, 60, 0.3, 4);
    }
    if (b.charging <= 0 && b.chargesLeft > 1) {
      b.chargesLeft--;
      b.phaseT += 2.2;
      harbingerCharge(b);
    }
  } else {
    // drift toward player
    b.x += Math.cos(aToP) * b.speed * spd * dt;
    b.y += Math.sin(aToP) * b.speed * spd * dt;
  }
  b.x = clamp(b.x, -80, WORLD.w + 80);
  b.y = clamp(b.y, -80, WORLD.h + 80);

  // attacks
  b.fireT -= dt;
  if (b.fireT <= 0) {
    const storm = b.mod === "storm";
    if (b.phase === 0) {
      // radial burst
      b.fireT = storm ? 1.25 : 1.7;
      const n = Math.round((14 + Math.floor(b.scale * 2)) * (storm ? 1.7 : 1));
      const off = rand(0, TAU);
      for (let i = 0; i < n; i++) enemyShoot(b.x, b.y, off + (TAU * i / n), 170, b.dmg * 0.5, "boss");
    } else if (b.phase === 1) {
      // aimed spread volley
      b.fireT = storm ? 0.7 : 0.9;
      const k = storm ? 3 : 2;
      for (let i = -k; i <= k; i++) enemyShoot(b.x, b.y, aToP + i * 0.16, 280, b.dmg * 0.5, "boss");
    } else {
      b.fireT = 1.2;
    }
  }

  // phase aegis: periodic damage immunity
  if (b.mod === "aegis") {
    if (b.shielded > 0) b.shielded -= dt;
    else {
      b.shieldT -= dt;
      if (b.shieldT <= 0) {
        b.shieldT = 8;
        b.shielded = 2.5;
        spawnText(b.x, b.y - b.r - 16, "PHASE AEGIS", "#7df9ff", 13);
        Sound.tone(520, 0.2, "sine", 0.1, 1040);
      }
    }
  }

  // minions under 50%
  if (b.hp < b.maxHp * 0.5) {
    b.minionT -= dt;
    if (b.minionT <= 0) {
      b.minionT = 7;
      for (let i = 0; i < 2; i++) spawnEnemy("darter", b.x + rand(-40, 40), b.y + rand(-40, 40), 1 + wave * 0.04);
      spawnText(b.x, b.y - b.r - 16, "REINFORCEMENTS", b.color, 13);
    }
  }
}

function updateMother(b, dt) {
  const aToP = angleTo(b.x, b.y, player.x, player.y);
  b.angle = lerp(b.angle, aToP, 1 - Math.pow(0.2, dt)); // slow turret turn

  // patrol an ellipse hugging the arena rim — she never chases
  b.edgeT -= dt;
  if (b.edgeT <= 0) { b.edgeT = rand(4, 8); b.edgeDir *= -1; }
  b.edgeA += b.edgeDir * 0.16 * dt;
  const tx = WORLD.w / 2 + Math.cos(b.edgeA) * (WORLD.w / 2 - 90);
  const ty = WORLD.h / 2 + Math.sin(b.edgeA) * (WORLD.h / 2 - 80);
  b.x += (tx - b.x) * Math.min(1, dt * 1.2);
  b.y += (ty - b.y) * Math.min(1, dt * 1.2);

  // core cycle: armored while sealed, vulnerable while open
  if (b.coreOpen > 0) {
    b.coreOpen -= dt;
    if (b.coreOpen <= 0) b.coreT = b.mod === "bulwark" ? 6.5 : 5.5;
  } else {
    b.coreT -= dt;
    if (b.coreT <= 0) {
      b.coreOpen = b.mod === "bulwark" ? 2.2 : 3.2;
      spawnText(b.x, b.y - b.r - 18, "CORE EXPOSED", "#ffe066", 15);
      Sound.tone(880, 0.25, "sine", 0.12, 440);
    }
  }

  if (b.mod === "regen" && b.coreOpen <= 0) {
    b.hp = Math.min(b.maxHp, b.hp + b.maxHp * 0.012 * dt);
  }

  // brood bays
  b.broodT -= dt;
  if (b.broodT <= 0) {
    b.broodT = b.mod === "prolific" ? 2.8 : 4.5;
    const count = b.mod === "prolific" ? 3 : 2;
    const pool = b.mod === "elite" ? ["sentry", "orbiter", "darter"] : ["drifter", "darter"];
    for (let i = 0; i < count; i++) {
      spawnEnemy(pick(pool), b.x + rand(-50, 50), b.y + rand(-50, 50), 1 + wave * 0.04);
    }
    spawnText(b.x, b.y - b.r - 18, "BROOD LAUNCHED", b.color, 13);
    Sound.tone(240, 0.18, "square", 0.07, 120);
  }

  // weapons: aimed fans while sealed, panicked radials while exposed
  b.fireT -= dt;
  if (b.fireT <= 0) {
    const home = b.mod === "seeker" ? 1.4 : 0;
    if (b.coreOpen > 0) {
      b.fireT = 1.4;
      const n = 10 + Math.floor(b.scale * 2);
      const off = rand(0, TAU);
      for (let i = 0; i < n; i++) enemyShoot(b.x, b.y, off + (TAU * i / n), 150, b.dmg * 0.5, "boss", home);
    } else {
      b.fireT = 2.0;
      for (let i = -1; i <= 1; i++) enemyShoot(b.x, b.y, aToP + i * 0.22, 230, b.dmg * 0.5, "boss", home);
    }
  }
}

function updateBullets(dt) {
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx * dt; b.y += b.vy * dt;
    b.life -= dt;
    if (b.life <= 0 || b.x < -20 || b.x > WORLD.w + 20 || b.y < -20 || b.y > WORLD.h + 20) {
      bullets.splice(i, 1); continue;
    }
    let consumed = false;
    // vs enemies
    for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j];
      if (e.spawnT > 0 || e.cloaked > 0 || b.hit.has(e)) continue;
      if (dist2(b.x, b.y, e.x, e.y) < (e.r + 5) * (e.r + 5)) {
        // shielder's frontal arc eats the bullet outright
        if (e.type === "shielder") {
          const ia = Math.atan2(b.y - e.y, b.x - e.x);
          const diff = ((ia - e.angle + Math.PI * 3) % TAU) - Math.PI;
          if (Math.abs(diff) < 1.0) {
            spawnParticles(b.x, b.y, e.color, 4, 100, 0.25, 2);
            Sound.tone(210, 0.05, "square", 0.05, 90);
            consumed = true;
            break;
          }
        }
        e.hp -= b.dmg;
        e.hitFlash = 0.08;
        Sound.hit();
        spawnParticles(b.x, b.y, e.color, 4, 120, 0.3, 2.5);
        if (b.crit) spawnText(e.x, e.y - e.r, Math.round(b.dmg) + "!", "#ffe066", 15);
        // knockback
        const ka = Math.atan2(b.vy, b.vx);
        e.x += Math.cos(ka) * 6; e.y += Math.sin(ka) * 6;
        if (e.hp <= 0) { killEnemy(e); enemies.splice(j, 1); }
        b.hit.add(e);
        if (b.pierce > 0) { b.pierce--; } else { consumed = true; }
        break;
      }
    }
    // vs boss
    if (!consumed && boss && boss.spawnT <= 0 && !b.hit.has(boss)) {
      if (dist2(b.x, b.y, boss.x, boss.y) < (boss.r + 5) * (boss.r + 5)) {
        // mother's sealed core shrugs off most damage; aegis phases block all of it
        let mul = 1;
        if (boss.id === "mother" && boss.coreOpen <= 0) mul = boss.mod === "bulwark" ? 0.1 : 0.3;
        if (boss.shielded > 0) mul = 0;
        boss.hp -= b.dmg * mul;
        boss.hitFlash = mul > 0 ? 0.06 : 0.02;
        Sound.hit();
        if (mul === 0 && Math.random() < 0.3) spawnText(b.x, b.y - 12, "IMMUNE", "#7df9ff", 12);
        spawnParticles(b.x, b.y, mul === 1 ? boss.color : "#8aa8c8", mul === 1 ? 5 : 2, 140, 0.3, 3);
        if (b.crit && mul > 0) spawnText(b.x, b.y - 14, Math.round(b.dmg * mul) + "!", "#ffe066", 15);
        b.hit.add(boss);
        if (b.pierce > 0) b.pierce--; else consumed = true;
        if (boss.hp <= 0) {
          stats.kills++; stats.bosses++; bump(stats.killsBy, "boss");
          if (boss.id === "harbinger") unlock("crimson");
          Sound.boom(true);
          spawnParticles(boss.x, boss.y, boss.color, 70, 360, 1.2, 6);
          spawnParticles(boss.x, boss.y, "#ffe066", 40, 280, 1.0, 4);
          shake = 24;
          const pts = boss.score * combo;
          score += pts;
          spawnText(boss.x, boss.y, "+" + pts, "#ffe066", 24);
          spawnText(cam.x + W / 2, cam.y + H / 2 - 90, BOSSES[boss.id].name + " DESTROYED", boss.color, 26);
          spawnPickup(boss.x - 20, boss.y, "heal");
          spawnPickup(boss.x + 20, boss.y, "gem");
          spawnPickup(boss.x, boss.y + 20, "gem");
          boss = null;
        }
      }
    }
    if (consumed) bullets.splice(i, 1);
  }
}

function updateEnemyBullets(dt) {
  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    const b = enemyBullets[i];
    if (b.mine) {
      // proximity mine: drifts to a stop, arms, detonates when stepped near
      b.vx *= Math.pow(0.05, dt); b.vy *= Math.pow(0.05, dt);
      b.x += b.vx * dt; b.y += b.vy * dt;
      b.life -= dt;
      if (b.armT > 0) b.armT -= dt;
      if (b.life <= 0) { enemyBullets.splice(i, 1); continue; }
      if (b.armT <= 0 && dist2(b.x, b.y, player.x, player.y) < 70 * 70) {
        enemyBullets.splice(i, 1);
        Sound.boom(true);
        spawnParticles(b.x, b.y, "#ffd24d", 30, 300, 0.7, 4);
        spawnParticles(b.x, b.y, "#fff", 10, 200, 0.4, 3);
        shake = Math.min(shake + 10, 20);
        if (dist2(b.x, b.y, player.x, player.y) < 110 * 110) damagePlayer(b.dmg, "minelayer");
      }
      continue;
    }
    if (b.home) {
      // curve toward the player at a capped turn rate (rad/s)
      const cur = Math.atan2(b.vy, b.vx);
      const want = angleTo(b.x, b.y, player.x, player.y);
      const diff = ((want - cur + Math.PI * 3) % TAU) - Math.PI;
      const na = cur + clamp(diff, -b.home * dt, b.home * dt);
      const spd = Math.hypot(b.vx, b.vy);
      b.vx = Math.cos(na) * spd; b.vy = Math.sin(na) * spd;
    }
    b.x += b.vx * dt; b.y += b.vy * dt;
    b.life -= dt;
    if (b.life <= 0 || b.x < -20 || b.x > WORLD.w + 20 || b.y < -20 || b.y > WORLD.h + 20) {
      enemyBullets.splice(i, 1); continue;
    }
    if (dist2(b.x, b.y, player.x, player.y) < (b.r + player.r - 3) * (b.r + player.r - 3)) {
      enemyBullets.splice(i, 1);
      damagePlayer(b.dmg, b.src || "bullet");
    }
  }
}

function updatePickups(dt) {
  for (let i = pickups.length - 1; i >= 0; i--) {
    const p = pickups[i];
    p.life -= dt;
    p.bob += dt * 4;
    if (p.life <= 0) { pickups.splice(i, 1); continue; }
    p.vx *= Math.pow(0.1, dt); p.vy *= Math.pow(0.1, dt);
    // magnet
    const d = Math.sqrt(dist2(p.x, p.y, player.x, player.y));
    if (d < player.magnet) {
      const a = angleTo(p.x, p.y, player.x, player.y);
      const pull = lerp(420, 60, d / player.magnet);
      p.vx += Math.cos(a) * pull * dt * 6;
      p.vy += Math.sin(a) * pull * dt * 6;
    }
    p.x += p.vx * dt; p.y += p.vy * dt;
    if (d < player.r + 12) {
      pickups.splice(i, 1);
      stats.pickups++;
      if (stats.pickups >= 250) unlock("midas");
      if (p.kind === "heal") {
        player.hp = Math.min(player.hp + 20, player.maxHp);
        Sound.heal();
        spawnText(player.x, player.y - 28, "+20 HP", "#27e8a7", 15);
        spawnParticles(player.x, player.y, "#27e8a7", 10, 130, 0.5);
      } else {
        const pts = 50 * combo;
        score += pts;
        Sound.pickup();
        spawnText(player.x, player.y - 28, "+" + pts, "#ffe066", 14);
      }
    }
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    p.vx *= Math.pow(0.15, dt);
    p.vy *= Math.pow(0.15, dt);
    p.x += p.vx * dt; p.y += p.vy * dt;
  }
}

function updateTexts(dt) {
  for (let i = texts.length - 1; i >= 0; i--) {
    const t = texts[i];
    t.life -= dt;
    t.y += t.vy * dt;
    t.vy *= Math.pow(0.3, dt);
    if (t.life <= 0) texts.splice(i, 1);
  }
}

// ---------- Render ----------
function render() {
  ctx.save();
  // background
  ctx.fillStyle = "#04040a";
  ctx.fillRect(0, 0, W, H);

  // screen shake
  if (shake > 0.3) {
    ctx.translate(rand(-shake, shake) * 0.5, rand(-shake, shake) * 0.5);
  }

  drawStars();

  if (state === "title" || state === "scores" || state === "stats" || state === "ships" || state === "settings") {
    drawGrid();
    if (state === "title") drawTitle();
    else if (state === "scores") drawScores();
    else if (state === "stats") drawStats();
    else if (state === "settings") drawSettings();
    else drawShips();
    drawParticles();
    drawToasts();
    ctx.restore();
    return;
  }

  // world-space pass, offset by the camera
  ctx.save();
  ctx.translate(-cam.x, -cam.y);
  drawArena();
  drawPickups();
  drawEnemies();
  drawBoss();
  if (state !== "over") drawPlayer();
  drawDrones();
  drawBullets();
  drawEnemyBullets();
  drawParticles();
  drawTexts();
  ctx.restore();

  // screen-space pass
  drawOffscreenPings();
  drawHUD();
  drawTouchControls();
  drawToasts();

  if (state === "upgrade") drawUpgradeScreen();
  if (state === "over") drawGameOver();
  if (introPopup && state === "play") drawEnemyIntro();
  if (paused && state === "play") drawPaused();

  // damage flash
  if (flashAlpha > 0) {
    ctx.fillStyle = `rgba(255,40,70,${flashAlpha * 0.5})`;
    ctx.fillRect(-30, -30, W + 60, H + 60);
  }
  ctx.restore();
}

function drawStars() {
  ctx.save();
  for (const s of stars) {
    const tw = 0.5 + 0.5 * Math.sin(time * 2 + s.tw);
    const par = 0.15 + 0.4 * s.z; // deeper stars scroll slower as the camera moves
    const px = ((s.x * W - cam.x * par) % W + W) % W;
    const py = ((s.y * H - cam.y * par) % H + H) % H;
    ctx.globalAlpha = 0.25 + 0.55 * s.z * tw;
    ctx.fillStyle = s.z > 0.7 ? "#bfe8ff" : "#5f7fa8";
    const sz = s.z * 2;
    ctx.fillRect(px, py, sz, sz);
  }
  ctx.restore();
}

// world-space backdrop: grid over the visible slice of the arena + its border
function drawArena() {
  ctx.save();
  ctx.globalAlpha = 0.05;
  ctx.strokeStyle = "#3fa9ff";
  ctx.lineWidth = 1;
  const gs = 60;
  const x0 = Math.max(0, Math.floor(cam.x / gs) * gs), x1 = Math.min(WORLD.w, cam.x + W);
  const y0 = Math.max(0, Math.floor(cam.y / gs) * gs), y1 = Math.min(WORLD.h, cam.y + H);
  ctx.beginPath();
  for (let x = x0; x <= x1; x += gs) { ctx.moveTo(x, Math.max(0, cam.y)); ctx.lineTo(x, y1); }
  for (let y = y0; y <= y1; y += gs) { ctx.moveTo(Math.max(0, cam.x), y); ctx.lineTo(x1, y); }
  ctx.stroke();
  ctx.globalAlpha = 0.4;
  ctx.lineWidth = 2;
  neon("#3fa9ff", 16);
  ctx.strokeRect(0, 0, WORLD.w, WORLD.h);
  ctx.restore();
}

// edge markers for hostiles outside the camera's view
function drawOffscreenPings() {
  if (state !== "play") return;
  ctx.save();
  const list = boss ? enemies.concat(boss) : enemies;
  for (const e of list) {
    if (e.cloaked > 0 || e.spawnT > 0) continue;
    const sx = e.x - cam.x, sy = e.y - cam.y;
    if (sx > -e.r && sx < W + e.r && sy > -e.r && sy < H + e.r) continue;
    const px = clamp(sx, 18 + SAFE.l, W - 18 - SAFE.r);
    const py = clamp(sy, 30 + SAFE.t, H - 30 - SAFE.b);
    const a = Math.atan2(sy - py, sx - px);
    const s = e === boss ? 9 : 5.5;
    ctx.globalAlpha = e === boss ? 0.9 : 0.6;
    ctx.fillStyle = e.color;
    ctx.save();
    ctx.translate(px, py);
    ctx.rotate(a);
    ctx.beginPath();
    ctx.moveTo(s, 0); ctx.lineTo(-s * 0.7, s * 0.6); ctx.lineTo(-s * 0.7, -s * 0.6);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }
  ctx.restore();
}

function drawGrid() {
  ctx.save();
  ctx.globalAlpha = 0.05;
  ctx.strokeStyle = "#3fa9ff";
  ctx.lineWidth = 1;
  const gs = 60;
  ctx.beginPath();
  for (let x = 0; x <= W; x += gs) { ctx.moveTo(x, 0); ctx.lineTo(x, H); }
  for (let y = 0; y <= H; y += gs) { ctx.moveTo(0, y); ctx.lineTo(W, y); }
  ctx.stroke();
  ctx.restore();
}

function neon(color, blur = 14) {
  ctx.shadowColor = color;
  ctx.shadowBlur = blur;
}

function drawPlayer() {
  const p = player;
  ctx.save();
  ctx.translate(p.x, p.y);

  // invuln blink
  if (p.invuln > 0 && Math.floor(time * 16) % 2 === 0) ctx.globalAlpha = 0.35;

  // shield ring
  if (p.shield > 0) {
    ctx.save();
    neon("#7df9ff", 12);
    ctx.strokeStyle = "rgba(125,249,255,0.6)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, p.r + 8 + Math.sin(time * 4) * 1.5, 0, TAU);
    ctx.stroke();
    ctx.restore();
  }

  ctx.rotate(p.angle);
  neon(SKIN.hull, 16);
  // ship body
  ctx.fillStyle = SKIN.fill;
  ctx.strokeStyle = SKIN.hull;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(16, 0);
  ctx.lineTo(-10, -10);
  ctx.lineTo(-5, 0);
  ctx.lineTo(-10, 10);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  // cockpit dot
  ctx.fillStyle = SKIN.hull;
  ctx.beginPath();
  ctx.arc(4, 0, 3, 0, TAU);
  ctx.fill();
  ctx.restore();
}

function drawDrones() {
  for (const d of drones) {
    if (d.x === undefined) continue;
    ctx.save();
    ctx.translate(d.x, d.y);
    ctx.rotate(time * 4);
    neon("#ffe066", 10);
    ctx.strokeStyle = "#ffe066";
    ctx.fillStyle = "#332a08";
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    for (let i = 0; i < 4; i++) {
      const a = TAU * i / 4;
      const r = i % 2 === 0 ? 7 : 4;
      const x = Math.cos(a) * r, y = Math.sin(a) * r;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    ctx.restore();
  }
}

function drawBullets() {
  ctx.save();
  ctx.globalCompositeOperation = "lighter";
  for (const b of bullets) {
    const a = Math.atan2(b.vy, b.vx);
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(a);
    const col = b.crit ? "#ffe066" : b.drone ? "#ffd28a" : SKIN.bullet;
    neon(col, 10);
    ctx.fillStyle = col;
    ctx.fillRect(-7, -2, 14, 4);
    ctx.restore();
  }
  ctx.restore();
}

function drawEnemyBullets() {
  ctx.save();
  ctx.globalCompositeOperation = "lighter";
  for (const b of enemyBullets) {
    if (b.trail) { // weaver wake: fading embers
      neon("#ff66d9", 8);
      ctx.globalAlpha = clamp(b.life / 2, 0.2, 0.75);
      ctx.fillStyle = "#ff66d9";
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r * (0.7 + 0.3 * Math.sin(time * 6 + b.x)), 0, TAU);
      ctx.fill();
      ctx.globalAlpha = 1;
      continue;
    }
    if (b.mine) { // proximity mine: armed mines blink
      const blink = b.armT <= 0 && Math.floor(time * 5) % 2 === 0;
      neon("#ffd24d", 10);
      ctx.strokeStyle = "#ffd24d";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r + 3, 0, TAU);
      ctx.stroke();
      ctx.fillStyle = blink ? "#fff" : "#ffd24d";
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r * 0.55, 0, TAU);
      ctx.fill();
      continue;
    }
    neon("#ff3d6e", 10);
    ctx.fillStyle = "#ff3d6e";
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, TAU);
    ctx.fill();
    ctx.fillStyle = "#ffd0dc";
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r * 0.45, 0, TAU);
    ctx.fill();
  }
  ctx.restore();
}

function drawEnemies() {
  for (const e of enemies) {
    ctx.save();
    ctx.translate(e.x, e.y);

    if (e.spawnT > 0) {
      // spawn telegraph: shrinking ring
      const t = e.spawnT / 0.6;
      ctx.globalAlpha = 0.7;
      ctx.strokeStyle = e.color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, 0, e.r + t * 26, 0, TAU);
      ctx.stroke();
      ctx.restore();
      continue;
    }

    if (e.cloaked > 0) ctx.globalAlpha = 0.10 + 0.05 * Math.sin(time * 9); // phantom shimmer

    ctx.rotate(e.angle);
    const flash = e.hitFlash > 0;
    neon(e.color, 12);
    ctx.strokeStyle = flash ? "#ffffff" : e.color;
    ctx.fillStyle = flash ? "rgba(255,255,255,0.5)" : shade(e.color);
    ctx.lineWidth = 2;
    ctx.beginPath();
    traceEnemyShape(e.type, e.r, e.wobble);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    drawEnemyDetail(e.type, e.r, flash ? "#fff" : e.color);
    ctx.restore();

    // hp bar for damaged elites (anything with a beefy base hp pool)
    if (e.hp < e.maxHp && e.cloaked <= 0 && ENEMY_TYPES[e.type].hp >= 28) {
      const w = e.r * 2;
      ctx.fillStyle = "rgba(0,0,0,0.5)";
      ctx.fillRect(e.x - w / 2, e.y - e.r - 10, w, 4);
      ctx.fillStyle = e.color;
      ctx.fillRect(e.x - w / 2, e.y - e.r - 10, w * (e.hp / e.maxHp), 4);
    }
  }
}

// Path segments for an enemy body at the origin — shared by the arena
// renderer and the new-hostile briefing popup. Caller wraps in beginPath/closePath.
function traceEnemyShape(type, r, wobble) {
  switch (type) {
    case "drifter": { // pentagon blob
      for (let i = 0; i < 5; i++) {
        const a = TAU * i / 5 + wobble * 0.15;
        const rr = r * (0.85 + 0.15 * Math.sin(wobble + i * 2));
        const x = Math.cos(a) * rr, y = Math.sin(a) * rr;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      break;
    }
    case "darter": { // arrow
      ctx.moveTo(r * 1.4, 0);
      ctx.lineTo(-r, -r * 0.9);
      ctx.lineTo(-r * 0.4, 0);
      ctx.lineTo(-r, r * 0.9);
      break;
    }
    case "sentry": { // diamond w/ inner eye
      ctx.moveTo(r, 0); ctx.lineTo(0, -r); ctx.lineTo(-r, 0); ctx.lineTo(0, r);
      break;
    }
    case "orbiter": { // triangle
      for (let i = 0; i < 3; i++) {
        const a = TAU * i / 3 + wobble;
        const x = Math.cos(a) * r, y = Math.sin(a) * r;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      break;
    }
    case "titan": { // heavy hexagon
      for (let i = 0; i < 6; i++) {
        const a = TAU * i / 6 + wobble * 0.1;
        const x = Math.cos(a) * r, y = Math.sin(a) * r;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      break;
    }
    case "shielder": { // armored wedge
      ctx.moveTo(r * 0.9, -r * 0.55);
      ctx.lineTo(r * 0.9, r * 0.55);
      ctx.lineTo(-r * 0.2, r);
      ctx.lineTo(-r, 0);
      ctx.lineTo(-r * 0.2, -r);
      break;
    }
    case "weaver": { // slim dart
      ctx.moveTo(r * 1.5, 0);
      ctx.lineTo(0, -r * 0.55);
      ctx.lineTo(-r * 1.2, 0);
      ctx.lineTo(0, r * 0.55);
      break;
    }
    case "phantom": { // four-point shard
      for (let i = 0; i < 8; i++) {
        const a = TAU * i / 8 + wobble * 0.2;
        const rr = i % 2 === 0 ? r * 1.1 : r * 0.4;
        const x = Math.cos(a) * rr, y = Math.sin(a) * rr;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      break;
    }
    case "minelayer": { // squat barge
      for (let i = 0; i < 8; i++) {
        const a = TAU * i / 8 + TAU / 16;
        const x = Math.cos(a) * r * 1.05, y = Math.sin(a) * r * 0.8;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      break;
    }
    case "reaver": { // pronged hunter-killer
      ctx.moveTo(r * 1.45, 0);
      ctx.lineTo(r * 0.1, -r * 0.5);
      ctx.lineTo(-r, -r);
      ctx.lineTo(-r * 0.45, 0);
      ctx.lineTo(-r, r);
      ctx.lineTo(r * 0.1, r * 0.5);
      break;
    }
    case "harbinger": { // 12-point star hull
      for (let i = 0; i < 12; i++) {
        const a = TAU * i / 12 + wobble * 0.05;
        const rr = i % 2 === 0 ? r : r * 0.72;
        const x = Math.cos(a) * rr, y = Math.sin(a) * rr;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      break;
    }
    case "mother": { // wide carrier octagon
      for (let i = 0; i < 8; i++) {
        const a = TAU * i / 8 + TAU / 16 + wobble * 0.04;
        const x = Math.cos(a) * r * 1.12, y = Math.sin(a) * r * 0.72;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      break;
    }
  }
}

function drawEnemyDetail(type, r, color) { // eye/ring/core accents, drawn at the origin
  if (type === "sentry") {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(0, 0, Math.max(3, r * 0.28), 0, TAU);
    ctx.fill();
  }
  if (type === "titan" || type === "harbinger") {
    ctx.strokeStyle = color;
    ctx.beginPath();
    ctx.arc(0, 0, r * (type === "harbinger" ? 0.45 : 0.5), 0, TAU);
    ctx.stroke();
  }
  if (type === "harbinger" || type === "mother") {
    ctx.fillStyle = type === "mother" ? "#ffe066" : color;
    ctx.beginPath();
    ctx.arc(0, 0, r * 0.2, 0, TAU);
    ctx.fill();
  }
  if (type === "shielder") { // frontal energy shield
    ctx.strokeStyle = color;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(0, 0, r + 7, -1.0, 1.0);
    ctx.stroke();
  }
  if (type === "reaver" || type === "minelayer") {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(0, 0, Math.max(3, r * 0.22), 0, TAU);
    ctx.fill();
  }
}

function shade(hex) {
  // dark translucent fill from a hex color
  const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r >> 2},${g >> 2},${b >> 2},0.85)`;
}

function drawBoss() {
  if (!boss) return;
  const b = boss;
  ctx.save();
  ctx.translate(b.x, b.y);

  if (b.spawnT > 0) {
    const t = b.spawnT;
    ctx.globalAlpha = 0.8;
    ctx.strokeStyle = b.color;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(0, 0, b.r + t * 60, 0, TAU);
    ctx.stroke();
    ctx.restore();
    return;
  }

  const flash = b.hitFlash > 0;
  ctx.rotate(b.angle);
  neon(b.color, 22);
  ctx.strokeStyle = flash ? "#fff" : b.color;
  ctx.lineWidth = 3;

  if (b.id === "mother") {
    // carrier hull: wide flattened octagon
    ctx.fillStyle = flash ? "rgba(255,255,255,0.4)" : "rgba(18,38,8,0.92)";
    ctx.beginPath();
    for (let i = 0; i < 8; i++) {
      const a = TAU * i / 8 + TAU / 16;
      const x = Math.cos(a) * b.r * 1.12, y = Math.sin(a) * b.r * 0.72;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    // brood bay slits
    ctx.strokeStyle = flash ? "#fff" : "rgba(155,255,77,0.5)";
    ctx.lineWidth = 2;
    for (const s of [-1, 1]) {
      ctx.beginPath();
      ctx.arc(0, 0, b.r * 0.8, s * 0.45 - 0.25, s * 0.45 + 0.25);
      ctx.stroke();
    }
    // core: armored while sealed, blazing while open
    const open = b.coreOpen > 0;
    const pulse = 0.6 + 0.4 * Math.sin(time * (open ? 10 : 3));
    ctx.fillStyle = flash ? "#fff" : open ? "#ffe066" : "rgba(155,255,77,0.35)";
    ctx.globalAlpha = open ? pulse : 0.8;
    ctx.beginPath();
    ctx.arc(0, 0, open ? 15 : 11, 0, TAU);
    ctx.fill();
    ctx.globalAlpha = 1;
    if (open) {
      neon("#ffe066", 18);
      ctx.strokeStyle = "#ffe066";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, 0, 20 + Math.sin(time * 8) * 3, 0, TAU);
      ctx.stroke();
    } else {
      // rotating armor plates seal the core
      ctx.save();
      ctx.rotate(time * 0.8);
      ctx.strokeStyle = flash ? "#fff" : b.color;
      ctx.lineWidth = 4;
      for (let i = 0; i < 3; i++) {
        const a = TAU * i / 3;
        ctx.beginPath();
        ctx.arc(0, 0, 16, a, a + TAU / 3 - 0.5);
        ctx.stroke();
      }
      ctx.restore();
    }
  } else {
    // harbinger: outer star-hex hull
    ctx.fillStyle = flash ? "rgba(255,255,255,0.4)" : "rgba(60,8,20,0.9)";
    ctx.beginPath();
    for (let i = 0; i < 12; i++) {
      const a = TAU * i / 12;
      const r = i % 2 === 0 ? b.r : b.r * 0.72;
      const x = Math.cos(a) * r, y = Math.sin(a) * r;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    // rotating inner ring
    ctx.save();
    ctx.rotate(time * 1.5);
    ctx.strokeStyle = flash ? "#fff" : "#ff7a9c";
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let i = 0; i < 3; i++) {
      const a = TAU * i / 3;
      ctx.moveTo(Math.cos(a) * b.r * 0.45, Math.sin(a) * b.r * 0.45);
      ctx.lineTo(Math.cos(a + TAU / 6) * b.r * 0.45, Math.sin(a + TAU / 6) * b.r * 0.45);
    }
    ctx.stroke();
    ctx.restore();
    // core
    const pulse = 0.7 + 0.3 * Math.sin(time * 6);
    ctx.fillStyle = flash ? "#fff" : b.color;
    ctx.globalAlpha = pulse;
    ctx.beginPath();
    ctx.arc(0, 0, 10, 0, TAU);
    ctx.fill();
    ctx.globalAlpha = 1;
    // phase aegis: immunity bubble
    if (b.shielded > 0) {
      neon("#7df9ff", 16);
      ctx.strokeStyle = "rgba(125,249,255,0.8)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, 0, b.r + 10 + Math.sin(time * 5) * 2, 0, TAU);
      ctx.stroke();
    }
  }
  ctx.restore();

  // charge telegraph line
  if (b.phase === 2 && b.charging > 0.6) {
    ctx.save();
    ctx.globalAlpha = 0.35 * (1 + Math.sin(time * 30)) * 0.5 + 0.15;
    ctx.strokeStyle = b.color;
    ctx.lineWidth = 3;
    ctx.setLineDash([10, 8]);
    ctx.beginPath();
    ctx.moveTo(b.x, b.y);
    ctx.lineTo(b.x + Math.cos(b.chargeAngle) * 900, b.y + Math.sin(b.chargeAngle) * 900);
    ctx.stroke();
    ctx.restore();
  }
}

function drawPickups() {
  ctx.save();
  ctx.globalCompositeOperation = "lighter";
  for (const p of pickups) {
    const bobY = Math.sin(p.bob) * 3;
    const blink = p.life < 2.5 && Math.floor(p.life * 6) % 2 === 0;
    if (blink) continue;
    ctx.save();
    ctx.translate(p.x, p.y + bobY);
    if (p.kind === "heal") {
      neon("#27e8a7", 12);
      ctx.fillStyle = "#27e8a7";
      ctx.fillRect(-2.5, -8, 5, 16);
      ctx.fillRect(-8, -2.5, 16, 5);
    } else {
      ctx.rotate(p.bob * 0.5);
      neon("#ffe066", 12);
      ctx.fillStyle = "#ffe066";
      ctx.beginPath();
      ctx.moveTo(0, -8); ctx.lineTo(6, 0); ctx.lineTo(0, 8); ctx.lineTo(-6, 0);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
  }
  ctx.restore();
}

function drawParticles() {
  ctx.save();
  ctx.globalCompositeOperation = "lighter";
  for (const p of particles) {
    const a = clamp(p.life / p.maxLife, 0, 1);
    ctx.globalAlpha = a;
    ctx.fillStyle = p.color;
    const s = p.size * a;
    ctx.fillRect(p.x - s / 2, p.y - s / 2, s, s);
  }
  ctx.restore();
}

function drawTexts() {
  ctx.save();
  ctx.textAlign = "center";
  for (const t of texts) {
    ctx.globalAlpha = clamp(t.life, 0, 1);
    ctx.font = `bold ${t.size}px 'Courier New', monospace`;
    ctx.fillStyle = t.color;
    neon(t.color, 8);
    ctx.fillText(t.str, t.x, t.y);
  }
  ctx.restore();
}

function drawToasts() {
  if (!toasts.length) return;
  ctx.save();
  ctx.textAlign = "center";
  ctx.font = "bold 15px 'Courier New', monospace";
  toasts.forEach((t, i) => {
    ctx.globalAlpha = clamp(t.life / 0.6, 0, 1) * 0.95;
    ctx.fillStyle = "#ffe066";
    neon("#ffe066", 10);
    ctx.fillText(t.str, W / 2, 86 + SAFE.t + i * 24);
  });
  ctx.restore();
}

function drawHUD() {
  ctx.save();
  ctx.shadowBlur = 0;
  ctx.font = "bold 16px 'Courier New', monospace";

  // HP bar
  const bw = 220, bh = 14, bx = 20 + SAFE.l, by = 20 + SAFE.t;
  ctx.fillStyle = "rgba(0,0,0,0.55)";
  ctx.fillRect(bx - 2, by - 2, bw + 4, bh + 4);
  const hpFrac = player.hp / player.maxHp;
  const hpColor = hpFrac > 0.5 ? "#27e8a7" : hpFrac > 0.25 ? "#ffe066" : "#ff3d6e";
  ctx.fillStyle = hpColor;
  ctx.fillRect(bx, by, bw * hpFrac, bh);
  ctx.strokeStyle = "rgba(255,255,255,0.3)";
  ctx.strokeRect(bx - 2, by - 2, bw + 4, bh + 4);
  ctx.fillStyle = "#cfe8ff";
  ctx.textAlign = "left";
  ctx.font = "bold 11px 'Courier New', monospace";
  ctx.fillText(`${Math.ceil(player.hp)}/${player.maxHp}`, bx + 4, by + 11);

  // shield pips
  for (let i = 0; i < player.maxShield; i++) {
    ctx.fillStyle = i < player.shield ? "#7df9ff" : "rgba(125,249,255,0.15)";
    ctx.beginPath();
    ctx.arc(bx + bw + 16 + i * 18, by + bh / 2, 6, 0, TAU);
    ctx.fill();
  }

  // dash cooldown
  ctx.font = "bold 11px 'Courier New', monospace";
  ctx.fillStyle = player.dashT <= 0 ? "#7df9ff" : "rgba(125,249,255,0.35)";
  const dashFrac = player.dashT <= 0 ? 1 : 1 - player.dashT / player.dashCd;
  ctx.fillText("DASH", bx, by + 36);
  ctx.fillStyle = "rgba(0,0,0,0.55)";
  ctx.fillRect(bx + 44, by + 27, 80, 10);
  ctx.fillStyle = player.dashT <= 0 ? "#7df9ff" : "#3a6f8a";
  ctx.fillRect(bx + 44, by + 27, 80 * dashFrac, 10);

  // score / wave / combo
  ctx.textAlign = "right";
  ctx.font = "bold 22px 'Courier New', monospace";
  ctx.fillStyle = "#ffe066";
  ctx.fillText(score.toLocaleString(), W - 20 - SAFE.r, 36 + SAFE.t);
  ctx.font = "bold 13px 'Courier New', monospace";
  ctx.fillStyle = "#8aa8c8";
  ctx.fillText("HI " + highScore.toLocaleString(), W - 20 - SAFE.r, 56 + SAFE.t);
  ctx.textAlign = "center";
  ctx.fillStyle = "#cfe8ff";
  ctx.font = "bold 16px 'Courier New', monospace";
  ctx.fillText("WAVE " + wave, W / 2, 30 + SAFE.t);
  if (combo > 1) {
    const cFrac = comboTimer / 3.5;
    ctx.fillStyle = "#ffe066";
    ctx.font = `bold ${16 + combo}px 'Courier New', monospace`;
    ctx.fillText("x" + combo, W / 2, 58 + SAFE.t);
    ctx.fillStyle = "rgba(255,224,102,0.4)";
    ctx.fillRect(W / 2 - 30, 64 + SAFE.t, 60 * cFrac, 3);
  }

  // boss hp bar
  if (boss && boss.spawnT <= 0) {
    const bbw = Math.min(W * 0.5, 500);
    const bby = H - 38 - SAFE.b;
    ctx.fillStyle = "rgba(0,0,0,0.55)";
    ctx.fillRect(W / 2 - bbw / 2 - 2, bby, bbw + 4, 16);
    ctx.fillStyle = boss.color;
    ctx.fillRect(W / 2 - bbw / 2, bby + 2, bbw * clamp(boss.hp / boss.maxHp, 0, 1), 12);
    ctx.strokeStyle = "rgba(255,255,255,0.3)";
    ctx.strokeRect(W / 2 - bbw / 2 - 2, bby, bbw + 4, 16);
    ctx.fillStyle = boss.color;
    ctx.font = "bold 12px 'Courier New', monospace";
    ctx.fillText(BOSSES[boss.id].name + (boss.modName ? " · " + boss.modName : ""), W / 2, bby - 6);
  }

  // wave banner
  if (waveBannerT > 0 && state === "play") {
    const a = clamp(Math.min(waveBannerT, 2.2 - waveBannerT) * 2, 0, 1);
    ctx.globalAlpha = a;
    ctx.font = "bold 44px 'Courier New', monospace";
    ctx.fillStyle = wave % 5 === 0 ? BOSSES[bossIdForWave(wave)].color : "#7df9ff";
    neon(ctx.fillStyle, 20);
    ctx.fillText(wave % 5 === 0 ? "⚠ " + BOSSES[bossIdForWave(wave)].name + " ⚠" : "WAVE " + wave, W / 2, H * 0.32);
    ctx.globalAlpha = 1;
  }

  // score ghost: your best run ended on this wave
  if (ghostNoteT > 0 && state === "play") {
    ctx.globalAlpha = clamp(Math.min(ghostNoteT, 3.2 - ghostNoteT) * 2, 0, 0.85);
    ctx.font = "bold 14px 'Courier New', monospace";
    ctx.textAlign = "center";
    ctx.fillStyle = "#ff7a9c";
    ctx.fillText("☠ your best run died on this wave", W / 2, H * 0.32 + 30);
    ctx.globalAlpha = 1;
  }

  // mute hint (touch users get on-screen buttons instead)
  if (!TOUCH.active) {
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 0.4;
    ctx.font = "11px 'Courier New', monospace";
    ctx.textAlign = "right";
    ctx.fillStyle = "#8aa8c8";
    ctx.fillText(Sound.muted ? "[M] UNMUTE" : "[M] MUTE   [P] PAUSE", W - 20, H - 14 - SAFE.b);
  }
  ctx.restore();
}

function drawTouchControls() {
  if (!TOUCH.active || state !== "play") return;
  ctx.save();
  ctx.shadowBlur = 0;
  ctx.textAlign = "center";

  // virtual sticks (only while held)
  for (const s of [TOUCH.move, TOUCH.aim]) {
    if (s.id === null) continue;
    ctx.globalAlpha = 0.2;
    ctx.strokeStyle = "#7df9ff";
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(s.ox, s.oy, TOUCH.stickR, 0, TAU); ctx.stroke();
    ctx.globalAlpha = 0.35;
    ctx.fillStyle = "#7df9ff";
    ctx.beginPath(); ctx.arc(s.ox + s.dx * TOUCH.stickR, s.oy + s.dy * TOUCH.stickR, 16, 0, TAU); ctx.fill();
  }

  // dash button with cooldown ring
  const db = dashBtn();
  const frac = player.dashT <= 0 ? 1 : 1 - player.dashT / player.dashCd;
  ctx.globalAlpha = 0.28;
  ctx.fillStyle = "#0a1422";
  ctx.beginPath(); ctx.arc(db.x, db.y, db.r, 0, TAU); ctx.fill();
  ctx.globalAlpha = frac >= 1 ? 0.7 : 0.35;
  ctx.strokeStyle = "#7df9ff";
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(db.x, db.y, db.r, -Math.PI / 2, -Math.PI / 2 + TAU * frac); ctx.stroke();
  ctx.globalAlpha = frac >= 1 ? 0.8 : 0.4;
  ctx.fillStyle = "#7df9ff";
  ctx.font = "bold 14px 'Courier New', monospace";
  ctx.fillText("DASH", db.x, db.y + 5);

  // pause / mute buttons
  for (const [c, label, on] of [[pauseBtn(), "II", true], [muteBtn(), "♪", !Sound.muted]]) {
    ctx.globalAlpha = 0.25;
    ctx.fillStyle = "#0a1422";
    ctx.beginPath(); ctx.arc(c.x, c.y, c.r, 0, TAU); ctx.fill();
    ctx.globalAlpha = on ? 0.55 : 0.25;
    ctx.strokeStyle = "#8aa8c8";
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(c.x, c.y, c.r, 0, TAU); ctx.stroke();
    ctx.fillStyle = "#cfe8ff";
    ctx.font = "bold 13px 'Courier New', monospace";
    ctx.fillText(label, c.x, c.y + 4);
  }
  ctx.restore();
}

function drawTitle() {
  ctx.save();

  // version, top right
  ctx.font = "11px 'Courier New', monospace";
  ctx.fillStyle = "#5e6b7d";
  ctx.textAlign = "right";
  ctx.fillText("v" + VERSION, W - 12 - SAFE.r, 20 + SAFE.t);

  ctx.textAlign = "center";

  // drifting demo particles
  if (Math.random() < 0.1) {
    spawnParticles(rand(0, W), rand(0, H), pick(["#7df9ff", "#ff3d6e", "#ffe066", "#b14dff"]), 1, 30, 2, 2);
  }

  const pulse = 0.85 + 0.15 * Math.sin(time * 2);
  ctx.font = `bold ${Math.min(W * 0.09, 84)}px 'Courier New', monospace`;
  neon("#7df9ff", 30 * pulse);
  ctx.fillStyle = "#7df9ff";
  ctx.fillText("VOIDSURGE", W / 2, H * 0.32);
  ctx.shadowBlur = 0;

  ctx.font = "bold 16px 'Courier New', monospace";
  ctx.fillStyle = "#8aa8c8";
  ctx.fillText("the void is hungry. feed it.", W / 2, H * 0.32 + 36);

  ctx.font = "bold 15px 'Courier New', monospace";
  ctx.fillStyle = "#cfe8ff";
  const cy = H * 0.52;
  const lines = TOUCH.active ? [
    ["LEFT THUMB", "drag to move"],
    ["RIGHT THUMB", "drag to aim + fire"],
    ["DASH BUTTON", "dash (i-frames)"],
    ["TAP A CARD", "pick upgrades between waves"],
  ] : [
    ["WASD / ARROWS", "move"],
    ["MOUSE", "aim  +  hold to fire"],
    ["SPACE", "dash (i-frames)"],
    ["1 2 3", "pick upgrades between waves"],
  ];
  lines.forEach((l, i) => {
    ctx.fillStyle = "#7df9ff";
    ctx.textAlign = "right";
    ctx.fillText(l[0], W / 2 - 14, cy + i * 28);
    ctx.fillStyle = "#8aa8c8";
    ctx.textAlign = "left";
    ctx.fillText(l[1], W / 2 + 14, cy + i * 28);
  });

  ctx.textAlign = "center";
  if (Math.floor(time * 1.6) % 2 === 0) {
    ctx.font = "bold 20px 'Courier New', monospace";
    ctx.fillStyle = "#ffe066";
    neon("#ffe066", 12);
    ctx.fillText(TOUCH.active ? "TAP TO BEGIN" : "CLICK OR PRESS ENTER TO BEGIN", W / 2, H * 0.78);
    ctx.shadowBlur = 0;
  }

  if (highScore > 0) {
    ctx.font = "bold 14px 'Courier New', monospace";
    ctx.fillStyle = "#8aa8c8";
    ctx.fillText("HIGH SCORE  " + highScore.toLocaleString(), W / 2, H * 0.84);
  }

  // menu buttons: scores / stats / hangar
  for (const b of titleButtons()) {
    const hov = !TOUCH.active && inRect(mouse.x, mouse.y, b);
    ctx.fillStyle = hov ? "rgba(20,26,46,0.95)" : "rgba(10,14,28,0.8)";
    ctx.strokeStyle = hov ? "#ffe066" : "#3a6f8a";
    ctx.lineWidth = 2;
    roundRect(b.x, b.y, b.w, b.h, 8);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = hov ? "#ffe066" : "#8aa8c8";
    ctx.font = "bold 13px 'Courier New', monospace";
    ctx.textAlign = "center";
    ctx.fillText(b.label + (TOUCH.active ? "" : " [" + b.key + "]"), b.x + b.w / 2, b.y + b.h / 2 + 5);
  }
  ctx.restore();
}

function titleButtons() {
  const bw = Math.min(150, (W - 80) / 4 - 10), bh = 38, gap = 14;
  const x0 = W / 2 - (bw * 4 + gap * 3) / 2;
  const y = H - bh - 14 - SAFE.b;
  return [
    { id: "scores",   label: "SCORES",   key: "H", x: x0, y, w: bw, h: bh },
    { id: "stats",    label: "STATS",    key: "S", x: x0 + bw + gap, y, w: bw, h: bh },
    { id: "ships",    label: "SHIPS",    key: "C", x: x0 + (bw + gap) * 2, y, w: bw, h: bh },
    { id: "settings", label: "SETTINGS", key: "O", x: x0 + (bw + gap) * 3, y, w: bw, h: bh },
  ];
}

function titleButtonAt(x, y) {
  const b = titleButtons().find(b => inRect(x, y, b));
  return b ? b.id : null;
}

function drawMenuChrome(title, hint) {
  ctx.save();
  ctx.textAlign = "center";
  ctx.font = "bold 34px 'Courier New', monospace";
  ctx.fillStyle = "#7df9ff";
  neon("#7df9ff", 16);
  ctx.fillText(title, W / 2, H * 0.16);
  ctx.shadowBlur = 0;
  ctx.font = "12px 'Courier New', monospace";
  ctx.fillStyle = "#8aa8c8";
  ctx.globalAlpha = 0.7;
  ctx.fillText(hint || (TOUCH.active ? "tap anywhere to go back" : "[ESC] back"), W / 2, H * 0.16 + 22);
  ctx.restore();
}

function drawScores() {
  drawMenuChrome("TOP 10 RUNS");
  ctx.save();
  ctx.font = "bold 15px 'Courier New', monospace";
  if (!scores.length) {
    ctx.textAlign = "center";
    ctx.fillStyle = "#8aa8c8";
    ctx.fillText("no runs yet — the void awaits", W / 2, H * 0.5);
    ctx.restore();
    return;
  }
  const lh = Math.min(30, (H * 0.62) / 10);
  const y0 = H * 0.30;
  scores.forEach((e, i) => {
    const y = y0 + i * lh;
    const isLast = i === lastRunRank;
    if (isLast) neon("#ffe066", 8); else ctx.shadowBlur = 0;
    ctx.fillStyle = isLast ? "#ffe066" : i === 0 ? "#7df9ff" : "#cfe8ff";
    ctx.textAlign = "right";
    ctx.fillText("#" + (i + 1), W * 0.32, y);
    ctx.fillText(e.s.toLocaleString(), W * 0.52, y);
    ctx.textAlign = "left";
    ctx.fillStyle = isLast ? "#ffe066" : "#8aa8c8";
    ctx.fillText("wave " + e.w, W * 0.57, y);
    ctx.fillText(e.d, W * 0.72, y);
  });
  ctx.restore();
}

function drawStats() {
  drawMenuChrome("SERVICE RECORD");
  ctx.save();
  ctx.font = "bold 14px 'Courier New', monospace";
  const lh = Math.min(26, H * 0.058);
  const y0 = H * 0.30;

  let fav = "—", favN = 0;
  for (const id in stats.augments) {
    if (stats.augments[id] > favN) {
      favN = stats.augments[id];
      fav = (UPGRADES.find(u => u.id === id) || { name: id }).name;
    }
  }
  const t = Math.floor(stats.playTime);
  const timeStr = t >= 3600
    ? Math.floor(t / 3600) + "h " + Math.floor((t % 3600) / 60) + "m"
    : Math.floor(t / 60) + "m " + (t % 60) + "s";

  const rows = [
    ["RUNS", stats.runs],
    ["BEST WAVE", stats.bestWave],
    ["WAVES CLEARED", stats.wavesCleared],
    ["BOSSES DESTROYED", stats.bosses],
    ["BEST COMBO", "x" + stats.bestCombo],
    ["TOTAL KILLS", stats.kills.toLocaleString()],
    ["DASHES", stats.dashes.toLocaleString()],
    ["PICKUPS", stats.pickups.toLocaleString()],
    ["TIME IN THE VOID", timeStr],
    ["FAVORITE AUGMENT", fav],
  ];
  rows.forEach((r, i) => {
    const y = y0 + i * lh;
    ctx.textAlign = "right";
    ctx.fillStyle = "#8aa8c8";
    ctx.fillText(r[0], W * 0.44, y);
    ctx.textAlign = "left";
    ctx.fillStyle = "#cfe8ff";
    ctx.fillText(String(r[1]), W * 0.47, y);
  });

  const names = Object.keys(ENEMY_TYPES).concat("boss");
  const rh = lh * (names.length > 7 ? 0.62 : 0.85); // squeeze when the roster grows
  ctx.textAlign = "left";
  ctx.fillStyle = "#7df9ff";
  ctx.fillText("KILLS BY TYPE", W * 0.62, y0);
  names.forEach((n, i) => {
    const y = y0 + (i + 1) * rh;
    ctx.fillStyle = n === "boss" ? "#ff2255" : ENEMY_TYPES[n].color;
    ctx.fillText(n.toUpperCase(), W * 0.62, y);
    ctx.fillStyle = "#cfe8ff";
    ctx.fillText(String(stats.killsBy[n] || 0), W * 0.79, y);
  });
  const dy0 = y0 + (names.length + 1) * rh + lh * 0.6;
  ctx.fillStyle = "#ff3d6e";
  ctx.fillText("FELLED BY", W * 0.62, dy0);
  const deaths = Object.entries(stats.deathsBy).sort((a, b) => b[1] - a[1]).slice(0, 3);
  if (!deaths.length) {
    ctx.fillStyle = "#8aa8c8";
    ctx.fillText("nothing yet", W * 0.62, dy0 + lh * 0.85);
  }
  deaths.forEach(([n, c], i) => {
    ctx.fillStyle = "#8aa8c8";
    ctx.fillText(n.toUpperCase() + " ×" + c, W * 0.62, dy0 + (i + 1) * lh * 0.85);
  });
  ctx.restore();
}

function shipCardRects() {
  const cols = 4, gap = 14;
  const cw = Math.min(168, (W - 60 - (cols - 1) * gap) / cols);
  const ch = Math.min(150, H * 0.30);
  const x0 = W / 2 - (cols * cw + (cols - 1) * gap) / 2;
  const y0 = H * 0.26;
  return SKINS.map((s, i) => ({
    x: x0 + (i % cols) * (cw + gap),
    y: y0 + Math.floor(i / cols) * (ch + gap),
    w: cw, h: ch,
  }));
}

function shipCardAction(x, y) {
  const rects = shipCardRects();
  for (let i = 0; i < rects.length; i++) {
    if (inRect(x, y, rects[i])) {
      if (unlocked[SKINS[i].id]) selectSkin(SKINS[i].id);
      return true; // consume taps on locked cards too
    }
  }
  return false;
}

function drawShips() {
  drawMenuChrome("HANGAR", TOUCH.active ? "tap empty space to go back" : "[ESC] back");
  ctx.save();
  const rects = shipCardRects();
  SKINS.forEach((s, i) => {
    const r = rects[i];
    const isSel = s.id === skinId;
    const isUn = !!unlocked[s.id];
    const hov = !TOUCH.active && isUn && inRect(mouse.x, mouse.y, r);
    ctx.save();
    ctx.globalAlpha = isUn ? 1 : 0.55;
    neon(isSel ? "#ffe066" : s.hull, isSel ? 14 : hov ? 10 : 4);
    ctx.fillStyle = "rgba(10,14,28,0.92)";
    ctx.strokeStyle = isSel ? "#ffe066" : isUn ? (hov ? s.hull : "#3a6f8a") : "#26303f";
    ctx.lineWidth = 2;
    roundRect(r.x, r.y, r.w, r.h, 8);
    ctx.fill();
    ctx.stroke();
    ctx.shadowBlur = 0;

    // mini ship preview, pointing up
    ctx.save();
    ctx.translate(r.x + r.w / 2, r.y + r.h * 0.34);
    ctx.rotate(-Math.PI / 2);
    ctx.scale(1.3, 1.3);
    neon(isUn ? s.hull : "#444f5e", 10);
    ctx.fillStyle = isUn ? s.fill : "#181d26";
    ctx.strokeStyle = isUn ? s.hull : "#444f5e";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(16, 0); ctx.lineTo(-10, -10); ctx.lineTo(-5, 0); ctx.lineTo(-10, 10);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    ctx.restore();

    ctx.textAlign = "center";
    ctx.font = "bold 13px 'Courier New', monospace";
    ctx.fillStyle = isUn ? s.hull : "#5e6b7d";
    ctx.fillText(s.name, r.x + r.w / 2, r.y + r.h * 0.64);

    ctx.font = "10px 'Courier New', monospace";
    if (isSel) {
      ctx.fillStyle = "#ffe066";
      ctx.fillText("EQUIPPED", r.x + r.w / 2, r.y + r.h - 10);
    } else if (isUn) {
      ctx.fillStyle = "#8aa8c8";
      ctx.fillText(TOUCH.active ? "TAP TO EQUIP" : "[" + (i + 1) + "] EQUIP", r.x + r.w / 2, r.y + r.h - 10);
    } else {
      ctx.fillStyle = "#5e6b7d";
      wrapText("LOCKED: " + s.unlock, r.x + r.w / 2, r.y + r.h - 24, r.w - 14, 12);
    }
    ctx.restore();
  });
  ctx.restore();
}

function settingRowRects() {
  const w = Math.min(560, W * 0.72), h = 64, gap = 14;
  const x = W / 2 - w / 2, y0 = H * 0.30;
  return SETTING_DEFS.map((s, i) => ({ x, y: y0 + i * (h + gap), w, h }));
}

function settingAction(x, y) {
  const rects = settingRowRects();
  for (let i = 0; i < rects.length; i++) {
    if (inRect(x, y, rects[i])) { toggleSetting(SETTING_DEFS[i].id); return true; }
  }
  return false;
}

function drawSettings() {
  drawMenuChrome("SETTINGS", TOUCH.active ? "tap a row to toggle · tap empty space to go back" : "[1-9] or click to toggle · [ESC] back");
  ctx.save();
  const rects = settingRowRects();
  SETTING_DEFS.forEach((s, i) => {
    const r = rects[i];
    const on = !!settings[s.id];
    const hov = !TOUCH.active && inRect(mouse.x, mouse.y, r);
    ctx.fillStyle = hov ? "rgba(20,26,46,0.95)" : "rgba(10,14,28,0.85)";
    ctx.strokeStyle = hov ? "#ffe066" : "#3a6f8a";
    ctx.lineWidth = 2;
    roundRect(r.x, r.y, r.w, r.h, 8);
    ctx.fill();
    ctx.stroke();

    ctx.textAlign = "left";
    ctx.font = "bold 14px 'Courier New', monospace";
    ctx.fillStyle = "#cfe8ff";
    ctx.fillText((TOUCH.active ? "" : "[" + (i + 1) + "] ") + s.name, r.x + 16, r.y + 26);
    ctx.font = "11px 'Courier New', monospace";
    ctx.fillStyle = "#8aa8c8";
    ctx.fillText(s.desc, r.x + 16, r.y + 46);

    // ON/OFF pill
    const pw = 64, ph = 26, px = r.x + r.w - pw - 14, py = r.y + r.h / 2 - ph / 2;
    ctx.fillStyle = on ? "rgba(39,232,167,0.15)" : "rgba(255,61,110,0.12)";
    ctx.strokeStyle = on ? "#27e8a7" : "#ff3d6e";
    roundRect(px, py, pw, ph, 13);
    ctx.fill();
    ctx.stroke();
    ctx.textAlign = "center";
    ctx.font = "bold 13px 'Courier New', monospace";
    ctx.fillStyle = on ? "#27e8a7" : "#ff3d6e";
    ctx.fillText(on ? "ON" : "OFF", px + pw / 2, py + ph / 2 + 4);
  });
  ctx.restore();
}

function drawEnemyIntro() {
  const isBoss = !!BOSSES[introPopup.type];
  const t = ENEMY_TYPES[introPopup.type] || BOSSES[introPopup.type];
  const a = clamp(introPopup.t / 0.25, 0, 1); // pop-in
  ctx.save();
  ctx.globalAlpha = a * 0.78;
  ctx.fillStyle = "rgba(2,3,10,1)";
  ctx.fillRect(-30, -30, W + 60, H + 60);
  ctx.globalAlpha = a;

  const pw = Math.min(460, W * 0.74), ph = Math.min(250, H * 0.62);
  const px = W / 2 - pw / 2, py = H / 2 - ph / 2;
  neon(t.color, 18);
  ctx.fillStyle = "rgba(10,14,28,0.96)";
  ctx.strokeStyle = t.color;
  ctx.lineWidth = 2;
  roundRect(px, py, pw, ph, 12);
  ctx.fill();
  ctx.stroke();
  ctx.shadowBlur = 0;

  ctx.textAlign = "center";
  ctx.font = "bold 12px 'Courier New', monospace";
  ctx.fillStyle = "#ff7a9c";
  ctx.fillText(isBoss ? "⚠ PRIORITY TARGET DETECTED ⚠" : "⚠ NEW HOSTILE DETECTED ⚠", W / 2, py + 26);

  // live sprite, wobbling like the real thing
  ctx.save();
  ctx.translate(W / 2, py + ph * 0.36);
  const dr = clamp(t.r * 2, 26, 46);
  neon(t.color, 16);
  ctx.strokeStyle = t.color;
  ctx.fillStyle = shade(t.color);
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  traceEnemyShape(introPopup.type, dr, time * 3);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  drawEnemyDetail(introPopup.type, dr, t.color);
  ctx.restore();

  ctx.font = "bold 22px 'Courier New', monospace";
  ctx.fillStyle = t.color;
  neon(t.color, 10);
  ctx.fillText(t.name, W / 2, py + ph * 0.62);
  ctx.shadowBlur = 0;

  ctx.font = "13px 'Courier New', monospace";
  ctx.fillStyle = "#8aa8c8";
  wrapText(t.desc, W / 2, py + ph * 0.62 + 24, pw - 56, 17);

  if (introPopup.t > 0.35 && Math.floor(time * 1.6) % 2 === 0) {
    ctx.font = "bold 13px 'Courier New', monospace";
    ctx.fillStyle = "#ffe066";
    ctx.fillText(TOUCH.active ? "TAP TO ENGAGE" : "ANY KEY TO ENGAGE", W / 2, py + ph - 16);
  }
  ctx.restore();
}

function upgradeCardRects() {
  // shared by rendering, mouse hover, and touch hit-testing
  const cw = Math.min(230, W / 3.6), ch = Math.min(200, H * 0.52);
  const gap = 26;
  const totalW = upgradeChoices.length * cw + (upgradeChoices.length - 1) * gap;
  const x0 = W / 2 - totalW / 2;
  const y0 = H * 0.34;
  return upgradeChoices.map((u, i) => ({ x: x0 + i * (cw + gap), y: y0, w: cw, h: ch }));
}

function drawUpgradeScreen() {
  ctx.save();
  ctx.fillStyle = "rgba(2,3,10,0.78)";
  ctx.fillRect(-30, -30, W + 60, H + 60);

  ctx.textAlign = "center";
  ctx.font = "bold 34px 'Courier New', monospace";
  ctx.fillStyle = "#7df9ff";
  neon("#7df9ff", 16);
  ctx.fillText("WAVE " + wave + " CLEAR", W / 2, H * 0.2);
  ctx.shadowBlur = 0;
  ctx.font = "bold 15px 'Courier New', monospace";
  ctx.fillStyle = "#8aa8c8";
  ctx.fillText(TOUCH.active ? "tap an augment" : "choose an augment", W / 2, H * 0.2 + 30);

  const rects = upgradeCardRects();
  hoveredCard = -1;

  upgradeChoices.forEach((u, i) => {
    const { x, y: y0, w: cw, h: ch } = rects[i];
    const hov = !TOUCH.active && mouse.x >= x && mouse.x <= x + cw && mouse.y >= y0 && mouse.y <= y0 + ch;
    if (hov) hoveredCard = i;
    const lift = hov ? -8 : 0;

    ctx.save();
    ctx.translate(x, y0 + lift);
    neon(hov ? "#ffe066" : "#7df9ff", hov ? 18 : 8);
    ctx.fillStyle = hov ? "rgba(20,26,46,0.95)" : "rgba(10,14,28,0.95)";
    ctx.strokeStyle = hov ? "#ffe066" : "#3a6f8a";
    ctx.lineWidth = 2;
    roundRect(0, 0, cw, ch, 10);
    ctx.fill();
    ctx.stroke();
    ctx.shadowBlur = 0;

    ctx.textAlign = "center";
    ctx.font = "44px 'Courier New', monospace";
    ctx.fillStyle = hov ? "#ffe066" : "#7df9ff";
    ctx.fillText(u.icon, cw / 2, 64);

    ctx.font = "bold 16px 'Courier New', monospace";
    ctx.fillStyle = "#cfe8ff";
    ctx.fillText(u.name, cw / 2, 104);

    ctx.font = "13px 'Courier New', monospace";
    ctx.fillStyle = "#8aa8c8";
    wrapText(u.desc, cw / 2, 132, cw - 26, 17);

    const n = taken[u.id] || 0;
    if (n > 0) {
      ctx.font = "bold 12px 'Courier New', monospace";
      ctx.fillStyle = "#ffe066";
      ctx.fillText("owned x" + n, cw / 2, ch - 30);
    }

    ctx.font = "bold 13px 'Courier New', monospace";
    ctx.fillStyle = hov ? "#ffe066" : "#3a6f8a";
    ctx.fillText(TOUCH.active ? "[ TAP ]" : "[ " + (i + 1) + " ]", cw / 2, ch - 12);
    ctx.restore();
  });

  canvas.style.cursor = hoveredCard >= 0 ? "pointer" : "crosshair";
  ctx.restore();
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function wrapText(text, x, y, maxW, lh) {
  const words = text.split(" ");
  let line = "";
  for (const w of words) {
    const test = line ? line + " " + w : w;
    if (ctx.measureText(test).width > maxW && line) {
      ctx.fillText(line, x, y);
      line = w; y += lh;
    } else line = test;
  }
  if (line) ctx.fillText(line, x, y);
}

function drawGameOver() {
  ctx.save();
  const a = clamp(gameOverT * 1.5, 0, 0.82);
  ctx.fillStyle = `rgba(2,3,10,${a})`;
  ctx.fillRect(-30, -30, W + 60, H + 60);

  if (gameOverT > 0.4) {
    ctx.textAlign = "center";
    ctx.font = `bold ${Math.min(W * 0.07, 64)}px 'Courier New', monospace`;
    neon("#ff3d6e", 24);
    ctx.fillStyle = "#ff3d6e";
    ctx.fillText("VOID CLAIMED YOU", W / 2, H * 0.36);
    ctx.shadowBlur = 0;

    ctx.font = "bold 22px 'Courier New', monospace";
    ctx.fillStyle = "#ffe066";
    ctx.fillText("SCORE  " + score.toLocaleString(), W / 2, H * 0.48);
    ctx.font = "bold 15px 'Courier New', monospace";
    ctx.fillStyle = "#8aa8c8";
    ctx.fillText("reached wave " + wave, W / 2, H * 0.48 + 28);
    if (score >= highScore && score > 0) {
      ctx.fillStyle = "#27e8a7";
      neon("#27e8a7", 10);
      ctx.fillText("★ NEW HIGH SCORE ★", W / 2, H * 0.48 + 56);
      ctx.shadowBlur = 0;
    } else if (lastRunRank >= 0) {
      ctx.fillStyle = "#7df9ff";
      ctx.fillText("#" + (lastRunRank + 1) + " ON YOUR TOP 10", W / 2, H * 0.48 + 56);
    }
  }
  if (gameOverT > 0.8 && Math.floor(time * 1.6) % 2 === 0) {
    ctx.font = "bold 17px 'Courier New', monospace";
    ctx.fillStyle = "#7df9ff";
    ctx.textAlign = "center";
    ctx.fillText(TOUCH.active ? "TAP TO DIVE AGAIN" : "CLICK OR PRESS R TO DIVE AGAIN", W / 2, H * 0.7);
  }
  if (gameOverT > 0.8) {
    const r = overMenuRect();
    const hov = !TOUCH.active && inRect(mouse.x, mouse.y, r);
    ctx.fillStyle = "rgba(10,14,28,0.8)";
    ctx.strokeStyle = hov ? "#ffe066" : "#3a6f8a";
    ctx.lineWidth = 2;
    roundRect(r.x, r.y, r.w, r.h, 8);
    ctx.fill();
    ctx.stroke();
    ctx.font = "bold 13px 'Courier New', monospace";
    ctx.fillStyle = hov ? "#ffe066" : "#8aa8c8";
    ctx.textAlign = "center";
    ctx.fillText(TOUCH.active ? "MENU" : "MENU [T]", r.x + r.w / 2, r.y + 21);
  }
  ctx.restore();
}

function overMenuRect() {
  return { x: W / 2 - 70, y: H * 0.78, w: 140, h: 32 };
}

function drawPaused() {
  ctx.save();
  ctx.fillStyle = "rgba(2,3,10,0.6)";
  ctx.fillRect(-30, -30, W + 60, H + 60);
  ctx.textAlign = "center";
  ctx.font = "bold 40px 'Courier New', monospace";
  ctx.fillStyle = "#7df9ff";
  neon("#7df9ff", 16);
  ctx.fillText("PAUSED", W / 2, H / 2);
  ctx.shadowBlur = 0;
  ctx.font = "14px 'Courier New', monospace";
  ctx.fillStyle = "#8aa8c8";
  ctx.fillText(TOUCH.active ? "tap to resume" : "press P or ESC to resume", W / 2, H / 2 + 32);
  ctx.restore();
}

// ---------- Main loop ----------
let lastT = performance.now();
function frame(now) {
  let dt = (now - lastT) / 1000;
  lastT = now;
  if (dt > 0.05) dt = 0.05; // clamp big frame gaps
  update(dt);
  render();
  if (state !== "upgrade") canvas.style.cursor = "crosshair";
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// ---------- PWA service worker (offline play; needs HTTPS or localhost) ----------
try {
  if (typeof navigator !== "undefined" && "serviceWorker" in navigator &&
      typeof location !== "undefined" &&
      (location.protocol === "https:" || location.hostname === "localhost" || location.hostname === "127.0.0.1")) {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  }
} catch (e) {}
</script>
